    "<input type='text' id='aa-time' placeholder='09:00' style='width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:4px 8px;font-size:12px'></div>" +
    "<div><label style='font-size:11px;color:var(--muted)'>Activity *</label>" +
    "<input type='text' id='aa-activity' placeholder='e.g. Museum visit' style='width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:4px 8px;font-size:12px'></div>" +
    "</div>" +
    "<div style='margin-bottom:8px'><label style='font-size:11px;color:var(--muted)'>Duration (minutes)</label>" +
    "<input type='number' id='aa-duration' placeholder='60' min='0' style='width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:4px 8px;font-size:12px'></div>" +
    "<div style='margin-bottom:8px'><label style='font-size:11px;color:var(--muted)'>Description</label>" +
    "<textarea id='aa-desc' rows='2' placeholder='Optional notes...' style='width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:4px 8px;font-size:12px;resize:vertical'></textarea></div>" +
    "<div style='margin-bottom:12px;display:flex;align-items:center;gap:8px'>" +
    "<input type='checkbox' id='aa-booking'><label for='aa-booking' style='font-size:12px'>Booking required</label></div>" +
    "<div class='modal-actions'>" +
    "<button class='btn-cancel' onclick='closeModal()'>Cancel</button>" +
    "<button class='btn-save' onclick='saveAddActivity(\"" + key + "\",\"" + sk + "\")'>Add</button>" +
    "</div>";
  document.getElementById("modalOverlay").classList.add("show");
  setTimeout(function() { var el = document.getElementById("aa-activity"); if (el) el.focus(); }, 50);
}

function saveAddActivity(key, sk) {
  var activity = (document.getElementById("aa-activity") || {}).value || "";
  if (!activity.trim()) return;
  var time = (document.getElementById("aa-time") || {}).value || "";
  var duration = parseInt((document.getElementById("aa-duration") || {}).value || "0") || 0;
  var desc = (document.getElementById("aa-desc") || {}).value || "";
  var booking = !!(document.getElementById("aa-booking") || {}).checked;

  var newItem = { time: time, activity: activity.trim(), duration_min: duration, description: desc, url: "", booking_required: booking };

  var ov = getOverride("cal_" + key);
  if (!ov.slots) ov.slots = {};
  var cal = TPG.calendar || {};
  var day = cal[key];
  var rawSlot = day && day.slots && day.slots[sk];
  var ovSlot = ov.slots[sk] !== undefined ? ov.slots[sk] : null;
  var currentText = ovSlot !== null ? getSlotText(ovSlot) : getSlotText(rawSlot);
  var currentItems = ovSlot !== null ? getSlotItems(ovSlot) : getSlotItems(rawSlot);
  currentItems.push(newItem);
  /* Ordina per orario */
  currentItems.sort(function(a, b) { return (a.time || "").localeCompare(b.time || ""); });
  ov.slots[sk] = { text: currentText, items: currentItems };
  setOverride("cal_" + key, ov);
  closeModal();
  renderDayView(key);
  renderCalSidebar();
}

function clearSlotOverride(key, sk) {
  var ov = getOverride("cal_" + key);
  if (ov.slots) delete ov.slots[sk];
  setOverride("cal_" + key, ov);
  renderDayView(key);
}

function clearSlotContent(key, sk) {
  /* Svuota lo slot salvando un override vuoto */
  var ov = getOverride("cal_" + key);
  if (!ov.slots) ov.slots = {};
  ov.slots[sk] = { text: "", items: [] };
  setOverride("cal_" + key, ov);
  renderDayView(key);
  renderCalSidebar();
}

function openItemDetail(itemId) {
  var found = null; var foundType = "";
  var legs = TPG.legs || [];
  for (var i = 0; i < legs.length && !found; i++) {
    var leg = legs[i];
    var exc = (leg.excursions || []).find(function(e) { return e.id === itemId; });
    if (exc) { found = exc; foundType = "excursion"; break; }
    var att = (leg.attractions || []).find(function(a) { return a.id === itemId; });
    if (att) { found = att; foundType = "attraction"; break; }
    var mus = (leg.museums || []).find(function(m) { return m.id === itemId; });
    if (mus) { found = mus; foundType = "museum"; break; }
  }
  if (!found) return;
  var diffIcons = { easy: "🟢", medium: "🟡", hard: "🔴" };
  var html = "<div style='margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px'>";
  if (found.type) html += "<span class='card-cat'>" + escHtml(found.type) + "</span>";
  if (foundType === "excursion" && found.difficulty) html += "<span class='difficulty-badge diff-" + found.difficulty + "'>" + (diffIcons[found.difficulty] || "") + " " + found.difficulty + "</span>";
  if (foundType !== "excursion" && found.free !== undefined) html += "<span class='card-cat'>" + (found.free ? "✓ Gratuito" : (found.price_approx || "A pagamento")) + "</span>";
  html += "</div>";
  html += "<div class='card-meta' style='margin-bottom:12px'>";
  if (found.duration_hours) html += "<span>⏱ " + found.duration_hours + "h</span>";
  if (found.best_time) html += "<span>🕐 " + escHtml(found.best_time) + "</span>";
  if (found.hours) html += "<span>🕐 " + escHtml(found.hours) + "</span>";
  html += "</div>";
  if (found.permit_required) html += "<div style='padding:8px 10px;background:rgba(180,83,9,.1);border-radius:var(--radius);margin-bottom:10px;font-size:12px;color:var(--amber)'>🪪 Permesso richiesto" + (found.permit_notes ? ": " + escHtml(found.permit_notes) : "") + "</div>";
  if (found.description) html += "<div style='font-size:13px;line-height:1.6;margin-bottom:10px'>" + escHtml(found.description) + "</div>";
  if (found.notes) html += "<div style='font-size:12px;color:var(--muted);margin-bottom:10px'>" + escHtml(found.notes) + "</div>";
  html += "<div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:12px'>";
  if (found.lat && found.lng) html += "<button class='btn-sm' onclick='jumpMap(" + found.lat + "," + found.lng + ",\"" + escJs(found.name) + "\");closeModal()'>🗺️ Mappa</button>";
  if (found.url) html += "<a href='" + escHtml(found.url) + "' target='_blank' class='btn-sm' style='text-decoration:none'>↗ Info</a>";
  html += "<button class='btn-cancel' onclick='closeModal()'>Close</button></div>";
  document.getElementById("modalTitle").textContent = found.name;
  document.getElementById("modalBody").innerHTML = html;
  document.getElementById("modalOverlay").classList.add("show");
}

/* ============================================================
   JOURNEYS
   ============================================================ */
var SEG_TYPE_ICONS = {
  flight: "✈️", train: "🚆", bus: "🚌", car: "🚗",
  ferry: "⛴️", taxi: "🚕", transfer: "🚐", walk: "🚶", other: "🚀"
};

function renderJourneys(el) {
  var journeys = (TPG.journeys || []).concat(loadCustomJourneys());
  var dirLabels = { outbound: "Outbound", "return": "Return", internal: "Internal" };
  var dirColors = { outbound: "var(--accent)", "return": "var(--green)", internal: "var(--amber)" };

  var html = "<div class='section-title'>✈️ Journeys & Transport</div>";
  html += "<div class='filter-row' style='margin-bottom:14px'>";
  html += "<button class='btn-add-item' onclick='openJourneyModal(-1)'>+ Add viaggio</button>";
  html += "</div>";

  if (!journeys.length) {
    html += "<div class='placeholder'><div class='placeholder-icon'>✈️</div><div class='placeholder-text'>Nessun viaggio inserito.<br>Clicca <strong>+ Add viaggio</strong> per iniziare.</div></div>";
    el.innerHTML = html;
    return;
  }

  html += "<div class='section-sub'>Outbound/return and transfer segments. Click to confirm bookings.</div>";

  journeys.forEach(function(j, ji) {
    var isCustom = !!j._custom;
    var dirLabel = dirLabels[j.direction] || (j.direction || "Viaggio");
    var dirColor = dirColors[j.direction] || "var(--accent)";
    var segs = j.segments || [];
    var totalPrice = 0;
    var currency = "";
    segs.forEach(function(s) { if (s.price) { totalPrice += parseFloat(s.price) || 0; currency = s.price_currency || ""; } });

    html += "<div class='journey-block'>";
    html += "<div class='journey-header'>";
    html += "<span class='journey-direction' style='background:rgba(0,0,0,.04);color:" + dirColor + ";border:1px solid " + dirColor + "'>" + escHtml(dirLabel) + "</span>";
    html += "<span class='journey-label'>" + escHtml(j.label || dirLabel) + "</span>";
    html += "<span class='journey-date'>" + escHtml(j.date || "") + "</span>";
    if (totalPrice > 0) {
      html += "<span style='font-size:12px;font-weight:700;color:var(--green);margin-left:auto'>" + totalPrice.toFixed(2) + " " + currency + " totale</span>";
    }
    if (isCustom) {
      var custIdx = loadCustomJourneys().findIndex(function(c) { return c._id === j._id; });
      html += "<div style='display:flex;gap:6px;margin-left:auto'>";
      html += "<button class='btn-sm' onclick='openJourneyModal(" + custIdx + ")'>✏️</button>";
      html += "<button class='btn-sm' style='color:var(--red)' onclick='deleteCustomJourney(\"" + escJs(j._id) + "\")'>🗑</button>";
      html += "</div>";
    }
    html += "</div>";

    html += "<div class='segment-timeline'>";
    segs.forEach(function(seg) {
      var segId = seg.id || ("cj_" + j._id + "_" + Math.random());
      var isConfirmed = getOverride("seg_" + segId).confirmed || seg.confirmed;
      var icon = SEG_TYPE_ICONS[seg.type] || "🚀";
      html += "<div class='segment" + (isConfirmed ? " confirmed" : "") + "'>";
      html += "<div class='segment-top'>";
      html += "<span class='segment-type-icon'>" + icon + "</span>";
      html += "<div style='flex:1'>";
      html += "<div class='segment-route'>" + escHtml(seg.from || "") + " → " + escHtml(seg.to || "") + "</div>";
      html += "<div class='segment-times'>";
      if (seg.departure) html += "<span style='font-weight:700;color:var(--ink)'>" + escHtml(seg.departure) + "</span>";
      if (seg.departure && seg.arrival) html += "<span class='segment-arrow'>→</span>";
      if (seg.arrival) html += "<span>" + escHtml(seg.arrival) + "</span>";
      if (seg.duration_min) html += "<span style='color:var(--muted2)'>(" + Math.floor(seg.duration_min/60) + "h" + (seg.duration_min%60 ? (seg.duration_min%60)+"m" : "") + ")</span>";
      html += "</div>";
      html += "<div class='segment-meta'>";
      if (seg.carrier) html += "<span>🏷 " + escHtml(seg.carrier) + "</span>";
      if (seg.number) html += "<span>#" + escHtml(seg.number) + "</span>";
      if (seg.class) html += "<span>Classe " + escHtml(seg.class) + "</span>";
      if (seg.price) html += "<span style='color:var(--green);font-weight:700'>" + seg.price + " " + (seg.price_currency || "") + "</span>";
      html += "</div>";
      if (seg.booking_ref) {
        html += "<div style='font-size:11px;margin-top:4px;font-family:var(--mono);color:var(--accent)'>PNR: " + escHtml(seg.booking_ref) + "</div>";
      }
      if (seg.notes) {
        html += "<div style='font-size:11px;color:var(--muted);margin-top:4px'>" + escHtml(seg.notes) + "</div>";
      }
      html += "</div></div>";
      html += "<div class='segment-actions'>";
      if (isConfirmed) {
        html += "<span class='seg-confirmed-badge'>✓ Confirmed</span>";
        html += "<button class='btn-unconfirm-seg' onclick='confirmSeg(\"" + escJs(segId) + "\",false)'>Rimuovi</button>";
      } else {
        html += "<button class='btn-confirm-seg' onclick='confirmSeg(\"" + escJs(segId) + "\",true)'>✓ Confirm booking</button>";
      }
      if (seg.booking_url) {
        html += "<a href='" + escHtml(seg.booking_url) + "' target='_blank' class='btn-sm' style='text-decoration:none'>🔗 Book/Verifica</a>";
      }
      html += "</div></div>";
    });
    html += "</div></div>";
  });

  el.innerHTML = html;
}

/* ============================================================
   CUSTOM JOURNEYS — localStorage persistence
   ============================================================ */
var CJ_KEY = "tpg_custom_journeys";
function loadCustomJourneys() {
  try { return JSON.parse(localStorage.getItem(CJ_KEY) || "[]"); } catch(e) { return []; }
}
function saveCustomJourneys(arr) { localStorage.setItem(CJ_KEY, JSON.stringify(arr)); jbAutoSave(); }

function deleteCustomJourney(id) {
  var arr = loadCustomJourneys().filter(function(j) { return j._id !== id; });
  saveCustomJourneys(arr);
  var el = document.getElementById("sectionView");
  if (el) renderJourneys(el);
}

function openJourneyModal(custIdx) {
  /* custIdx = -1 for new, else index in loadCustomJourneys() */
  var existing = custIdx >= 0 ? (loadCustomJourneys()[custIdx] || null) : null;
  var segTypes = ["flight","train","bus","car","ferry","taxi","transfer","walk","other"];
  var directions = ["outbound","return","internal"];
  var dirLabels2 = { outbound:"Outbound", "return":"Return", internal:"Internal/Trasferimento" };

  var fieldVal = function(f, def) { return existing ? (existing[f] !== undefined ? existing[f] : def) : def; };

  var selDir = "<select id='jm_dir' style='width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--ink);font-family:var(--sans);font-size:13px;margin-bottom:8px'>";
  directions.forEach(function(d) {
    selDir += "<option value='" + d + "'" + (fieldVal("direction","outbound") === d ? " selected" : "") + ">" + dirLabels2[d] + "</option>";
  });
  selDir += "</select>";

  var inp = function(id, placeholder, val, type) {
    return "<input id='" + id + "' type='" + (type||"text") + "' placeholder='" + placeholder + "' value='" + escHtml(val||"") + "' style='flex:1;min-width:0;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--ink);font-family:var(--sans);font-size:12px'>";
  };

  var segs = fieldVal("segments", [{}]);
  /* Always show at least 1 segment, max 4 */
  while (segs.length < 1) segs.push({});

  var segHtml = "";
  for (var si = 0; si < Math.min(segs.length + 1, 4); si++) {
    var s = segs[si] || {};
    var isExtra = si >= segs.length;
    var colStyle = isExtra ? "opacity:.4;pointer-events:none" : "";
    if (si === segs.length && si > 0) colStyle = "opacity:.4"; /* hint for add */
    segHtml += "<div class='jm-seg' id='jms_" + si + "' style='" + (si >= segs.length && si > 0 ? "display:none" : "") + "'>";
    segHtml += "<div style='font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:8px 0 5px'>Segmento " + (si+1) + "</div>";
    segHtml += "<div style='display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px'>";
    var selType = "<select id='jms_type_" + si + "' style='padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--ink);font-family:var(--sans);font-size:12px'>";
    segTypes.forEach(function(t) {
      selType += "<option value='" + t + "'" + ((s.type||"flight") === t ? " selected" : "") + ">" + (SEG_TYPE_ICONS[t]||"") + " " + t + "</option>";
    });
    selType += "</select>";
    segHtml += selType;
    segHtml += inp("jms_from_" + si, "Da (es. Milano MXP)", s.from, "text");
    segHtml += inp("jms_to_" + si, "A (es. Manila MNL)", s.to, "text");
    segHtml += "</div>";
    segHtml += "<div style='display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px'>";
    segHtml += inp("jms_dep_" + si, "Partenza (es. 10:30)", s.departure, "text");
    segHtml += inp("jms_arr_" + si, "Arrivo (es. 06:45+1)", s.arrival, "text");
    segHtml += inp("jms_carrier_" + si, "Compagnia (es. Ryanair)", s.carrier, "text");
    segHtml += inp("jms_num_" + si, "N. volo/treno", s.number, "text");
    segHtml += "</div>";
    segHtml += "<div style='display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px'>";
    segHtml += inp("jms_ref_" + si, "PNR / codice prenotazione", s.booking_ref, "text");
    segHtml += inp("jms_url_" + si, "URL prenotazione", s.booking_url, "text");
    segHtml += inp("jms_price_" + si, "Prezzo (es. 85)", s.price, "text");
    segHtml += "</div>";
    segHtml += inp("jms_notes_" + si, "Note (es. bagaglio a mano incluso)", s.notes, "text");
    segHtml += "</div>";
  }

  var html = "";
  html += "<div style='display:flex;gap:8px;margin-bottom:8px'>";
  html += "<div style='flex:1'><div style='font-size:11px;color:var(--muted);margin-bottom:4px'>Etichetta viaggio</div>";
  html += inp("jm_label", "es. Roma → Tokyo", fieldVal("label",""), "text") + "</div>";
  html += "<div style='flex:0 0 120px'><div style='font-size:11px;color:var(--muted);margin-bottom:4px'>Data</div>";
  html += inp("jm_date", "YYYY-MM-DD", fieldVal("date",""), "date") + "</div>";
  html += "</div>";
  html += "<div style='font-size:11px;color:var(--muted);margin-bottom:4px'>Direzione</div>" + selDir;
  html += "<div id='jm_segs'>" + segHtml + "</div>";
  if ((segs.length) < 4) {
    html += "<button onclick='jmAddSeg()' class='btn-sm' style='margin-top:4px;color:var(--accent);border-color:var(--accent)'>+ Add segmento</button>";
  }
  html += "<div class='modal-actions'>";
  html += "<button class='btn-cancel' onclick='closeModal()'>Cancel</button>";
  html += "<button class='btn-save' onclick='saveJourneyModal(" + custIdx + ")'>Salva viaggio</button>";
  html += "</div>";

  document.getElementById("modalTitle").textContent = custIdx >= 0 ? "Edit journey" : "New journey";
  document.getElementById("modalBody").innerHTML = html;
  document.getElementById("jm_date").style.cssText += ";flex:none;width:130px";
  document.getElementById("modalOverlay").classList.add("show");
}

var _jmSegCount = 1;
function jmAddSeg() {
  /* Show next hidden segment row */
  for (var i = 1; i < 4; i++) {
    var el = document.getElementById("jms_" + i);
    if (el && el.style.display === "none") {
      el.style.display = "";
      _jmSegCount = i + 1;
      break;
    }
  }
}

function saveJourneyModal(custIdx) {
  var label = (document.getElementById("jm_label") || {}).value || "";
  var date = (document.getElementById("jm_date") || {}).value || "";
  var dir = (document.getElementById("jm_dir") || {}).value || "outbound";
  var segs = [];
  for (var si = 0; si < 4; si++) {
    var fromEl = document.getElementById("jms_from_" + si);
    var toEl = document.getElementById("jms_to_" + si);
    var segEl = document.getElementById("jms_" + si);
    if (!fromEl || !segEl || segEl.style.display === "none") continue;
    var fromVal = fromEl.value.trim();
    var toVal = toEl ? toEl.value.trim() : "";
    if (!fromVal && !toVal) continue;
    var g = function(id) { var el = document.getElementById(id); return el ? el.value.trim() : ""; };
    segs.push({
      id: "cjseg_" + Date.now() + "_" + si,
      type: g("jms_type_" + si) || "flight",
      from: fromVal,
      to: toVal,
      departure: g("jms_dep_" + si),
      arrival: g("jms_arr_" + si),
      carrier: g("jms_carrier_" + si),
      number: g("jms_num_" + si),
      booking_ref: g("jms_ref_" + si),
      booking_url: g("jms_url_" + si),
      price: g("jms_price_" + si) || null,
      notes: g("jms_notes_" + si)
    });
  }
  var arr = loadCustomJourneys();
  var entry = {
    _custom: true,
    _id: (custIdx >= 0 && arr[custIdx]) ? arr[custIdx]._id : ("cj_" + Date.now()),
    label: label,
    date: date,
    direction: dir,
    segments: segs
  };
  if (custIdx >= 0 && arr[custIdx]) {
    arr[custIdx] = entry;
  } else {
    arr.push(entry);
  }
  saveCustomJourneys(arr);
  closeModal();
  var el = document.getElementById("sectionView");
  if (el) renderJourneys(el);
  showSaveOk();
}

function confirmSeg(segId, val) {
  setOverride("seg_" + segId, { confirmed: val });
  var el = document.getElementById("sectionView");
  if (el && currentTab === "journeys") renderJourneys(el);
}

function getJourneysForDate(dateKey) {
  var result = [];
  (TPG.journeys || []).forEach(function(j) {
    if (j.date === dateKey) result.push(j);
  });
  var cal = (TPG.calendar || {})[dateKey];
  if (cal && cal.journey_refs && cal.journey_refs.length) {
    var ids = cal.journey_refs;
    (TPG.journeys || []).forEach(function(j) {
      if (ids.indexOf(j.id) !== -1 && result.indexOf(j) === -1) result.push(j);
    });
  }
  return result;
}

function renderDayJourneyBlock(journeys) {
  if (!journeys.length) return "";
  var html = "";
  journeys.forEach(function(j) {
    var dirLabels = { outbound: "Outbound", "return": "Return", internal: "Trasferimento" };
    html += "<div class='day-journey-block'>";
    html += "<div class='day-journey-title'>" + (SEG_TYPE_ICONS[j.segments && j.segments[0] && j.segments[0].type] || "✈️") + " " + (dirLabels[j.direction] || j.label || "Viaggio") + " — " + escHtml(j.date || "") + "</div>";
    (j.segments || []).forEach(function(seg) {
      var icon = SEG_TYPE_ICONS[seg.type] || "🚀";
      var isConf = getOverride("seg_" + seg.id).confirmed || seg.confirmed;
      html += "<div class='day-seg-row'>";
      html += "<span class='day-seg-time'>" + (seg.departure || "") + "</span>";
      html += "<span class='day-seg-icon'>" + icon + "</span>";
      html += "<div style='flex:1'>";
      html += "<div class='day-seg-route'>" + escHtml(seg.from || "") + " → " + escHtml(seg.to || "") + "</div>";
      html += "<div class='day-seg-carrier'>" + escHtml(seg.carrier || "") + (seg.number ? " " + seg.number : "") + (isConf ? " ✓" : "") + "</div>";
      html += "</div></div>";
    });
    html += "</div>";
  });
  return html;
}

/* ============================================================
   SLOT HELPERS (v1.0 compat + v1.1 structured)
   ============================================================ */
function getSlotText(slotVal) {
  if (!slotVal) return "";
  if (typeof slotVal === "string") return slotVal;
  return slotVal.text || "";
}

function getSlotItems(slotVal) {
  if (!slotVal || typeof slotVal === "string") return [];
  return slotVal.items || [];
}

function renderSlotContent(slotVal, style, dayKey, slotKey) {
  var text = getSlotText(slotVal);
  var items = getSlotItems(slotVal);
  var html = "";

  if (text) {
    html += "<div style='margin-bottom:" + (items.length ? "8px" : "0") + ";line-height:1.6'>" + escHtml(text) + "</div>";
  }

  if (items.length && style !== "sintetico") {
    html += "<div class='slot-items'>";
    items.forEach(function(item, idx) {
      if (!item.activity) return;
      var matchId = item._excursion_id || item._attraction_id || null;
      var clickable = matchId || false;
      html += "<div class='slot-item" + (clickable ? " slot-item-clickable" : "") + "'>";
      if (dayKey && slotKey && items.length > 1) {
        html += "<div class='slot-item-reorder'>";
        html += "<button class='slot-item-arrow' " + (idx === 0 ? "disabled" : "onclick='event.stopPropagation();moveSlotItem(\"" + dayKey + "\",\"" + slotKey + "\"," + idx + ",-1)'") + " title='Move up'>&#8593;</button>";
        html += "<button class='slot-item-arrow' " + (idx === items.length - 1 ? "disabled" : "onclick='event.stopPropagation();moveSlotItem(\"" + dayKey + "\",\"" + slotKey + "\"," + idx + ",1)'") + " title='Move down'>&#8595;</button>";
        html += "</div>";
      }
      html += "<div " + (clickable ? "onclick='openItemDetail(\"" + escJs(matchId) + "\")' title='Click for details' style=\"cursor:pointer\"" : "") + " style='flex:1;display:flex;gap:8px'>";
      html += "<div class='slot-item-time'>" + escHtml(item.time || "") + "</div>";
      html += "<div class='slot-item-body'>";
      html += "<div class='slot-item-activity'>" + escHtml(item.activity) + (clickable ? " <span style='font-size:9px;color:var(--accent)'>↗</span>" : "") + "</div>";
      if (style === "dettagliato" && item.description) {
        html += "<div class='slot-item-desc'>" + escHtml(item.description) + "</div>";
      }
      html += "<div class='slot-item-footer'>";
      if (item.duration_min) {
        var h = Math.floor(item.duration_min / 60);
        var m = item.duration_min % 60;
        html += "<span class='slot-item-duration'>⏱ " + (h > 0 ? h + "h" : "") + (m > 0 ? m + "m" : "") + "</span>";
      }
      if (item.booking_required) html += "<span class='slot-item-booking'>📋 Book ahead</span>";
      if (item.url && style === "dettagliato") {
        html += "<a class='slot-item-link' href='" + escHtml(item.url) + "' target='_blank'>↗ Info</a>";
      }
      html += "</div></div></div></div>";
    });
    html += "</div>";
  }

  if (!text && !items.length) return "";
  return html;
}
function showSection(sec) {
  currentSection = sec;
  var el = document.getElementById("sectionView");
  if (sec === "restaurants") renderRestaurants(el);
  else if (sec === "excursions") renderExcursions(el);
  else if (sec === "attractions" || sec === "museums") renderAttractions(el);
  else if (sec === "parks") renderParks(el);
  else if (sec === "logistics") renderLogistics(el);
  else if (sec === "events") renderEvents(el);
  else if (sec === "accommodation") renderAccommodation(el);
  else if (sec === "zones") renderZones(el);
  else if (sec === "notes") renderNotes(el);
  else if (sec === "import") renderImport(el);
  else if (sec === "guide") renderGuide(el);
}

function getItemsFromLegs(field) {
  var legs = getFilteredLegs();
  var items = [];
  legs.forEach(function(leg) {
    (leg[field] || []).forEach(function(item) {
      items.push(Object.assign({}, item, { _legId: leg.id, _legName: leg.name, _legColor: leg.color }));
    });
  });
  return items;
}

function confBadge(conf) {
  var c = conf || "medium";
  var icons = { high: "🟢", medium: "🟡", low: "🔴" };
  return "<span class='confidence-badge conf-" + c + "'>" + (icons[c] || "🟡") + " " + c + "</span>";
}

function mapBtn(lat, lng, name) {
  if (!lat || !lng) return "";
  return "<button class='btn-map' title='Center on map' onclick='jumpMap(" + lat + "," + lng + ",\"" + escJs(name) + "\")'>🗺️</button>";
}

function googleMapsBtn(name, legName) {
  /* Bottone per cercare su Google Maps quando l'AI non ha fornito un url diretto.
     Evita di mostrare link inventati: la ricerca la fa l'utente con un click. */
  var query = encodeURIComponent(name + (legName ? " " + legName : ""));
  return "<a class='btn-sm' title='Search on Google Maps' style='text-decoration:none' href='https://www.google.com/maps/search/?api=1&query=" + query + "' target='_blank'>📍 Maps</a>";
}

function noteBtn(itemId, label) {
  return "<button class='btn-note' title='Add note' onclick='toggleNote(\"" + escJs(itemId) + "\",\"" + escJs(label) + "\")'>📝</button>";
}

function noteArea(itemId) {
  var ov = getOverride("note_" + itemId);
  var val = ov.text || "";
  return "<div class='card-note-area" + (val ? " open" : "") + "' id='na-" + itemId + "'>" +
    "<div class='notes-label'>Nota personale</div>" +
    "<textarea class='card-note-input' id='ni-" + itemId + "' placeholder='Aggiungi una nota...'>" + escHtml(val) + "</textarea>" +
    "<div style='display:flex;align-items:center;gap:8px;margin-top:4px'>" +
    "<button class='btn-save-note' onclick='saveNote(\"" + escJs(itemId) + "\")'>Save</button>" +
    "<span class='saved-flash' id='nf-" + itemId + "'>Saved!</span>" +
    "</div></div>";
}

function toggleNote(itemId) {
  var na = document.getElementById("na-" + itemId);
  if (na) na.classList.toggle("open");
}

function saveNote(itemId) {
  var ta = document.getElementById("ni-" + itemId);
  if (!ta) return;
  setOverride("note_" + itemId, { text: ta.value });
  var flash = document.getElementById("nf-" + itemId);
  if (flash) {
    flash.classList.add("show");
    setTimeout(function() { flash.classList.remove("show"); }, 1500);
  }
}

  var html = "<div class='section-title'>🍽️ Restaurants</div>";
  html += "<div class='filter-row'>";

    return "<div class='fchip" + (restFilter === c ? " on" : "") + "' onclick='setRestFilter(\"" + escJs(c) + "\")'>" + c + "</div>";

      var idx = r._isCustom ? customLoad("restaurants").findIndex(function(c){return c._id===r._id;}) : -1;
      return "<div class='card" + (r._isCustom ? " card-custom" : "") + "'>" +
        "<div class='card-top'><div class='card-name'>" + escHtml(r.name) + "</div>" +
        "<span class='card-cat'>" + escHtml(r.category || "") + "</span></div>" +
        (r._legName && currentLegFilter === "all" ? "<div style='font-size:10px;color:" + escHtml(r._legColor||"") + ";font-weight:700;margin-bottom:2px'>" + escHtml(r._legName) + "</div>" : "") +
        "<div class='card-meta'>" +
        (r.price_range ? "<span>" + escHtml(r.price_range) + "</span>" : "") +
        (r.hours ? "<span>🕐 " + escHtml(r.hours) + "</span>" : "") +
        "</div>" +

  var typeIcons =  { monument:"🗿", square:"⛲", church:"⛪", neighborhood:"🏘️", viewpoint:"👁️", market:"🛒", museum:"🖼️", gallery:"🖼️", other:"📍" };

  html += "<div class='filter-row'><button class='btn-add-item' onclick='openCustomModal(\"attractions\")'>+ Add</button></div>";

  var toShow = activeFilter === "all" ? items : (grouped[activeFilter] || []);
  html += "<div class='section-sub'>" + toShow.length + " results</div>";
  html += "<div class='cards-grid'>" + toShow.map(function(a) {
    var t = (a.type || "other").toLowerCase();

    return "<div class='card'>" +
      "<div class='card-top'><div class='card-name'>" + icon + " " + escHtml(a.name) + "</div>" +
      "<span class='card-cat'>" + (typeLabels[t] || t) + "</span></div>" +

      (a.hours ? "<span>🕐 " + escHtml(a.hours) + "</span>" : "") +
      "</div>" +
      (a.description ? "<div class='card-body'>" + escHtml(a.description) + "</div>" : "") +

function renderAccommodation(el) {
  var legs = getFilteredLegs();
  var html = "<div class='section-title'>🏨 Accommodation</div>";
  legs.forEach(function(leg) {
    var acc = leg.accommodation || {};
    var opts = acc.options || [];
    if (!opts.length) return;
    var legOv = getOverride("acc_" + leg.id);
    var confirmedId = legOv.confirmed || acc.confirmed_item;
    var bookingRef = legOv.booking_ref || acc.booking_ref || "";
    html += "<div style='margin-bottom:28px'>";
    html += "<div style='font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:" + leg.color + ";margin-bottom:10px'>" + escHtml(leg.name) + "</div>";
    html += "<div style='font-size:11px;color:var(--muted);margin-bottom:8px'>Check-in: " + (acc.check_in || "—") + " &rarr; Check-out: " + (acc.check_out || "—") + "</div>";
    /* Campo riferimento prenotazione */
    html += "<div style='margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap'>";
    html += "<span style='font-size:11px;color:var(--muted)'>Booking ref:</span>";
    html += "<input type='text' value='" + escHtml(bookingRef) + "' placeholder='e.g. BK-1234567 or confirmation number' ";
    html += "style='flex:1;min-width:160px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:4px 8px;font-size:12px' ";
    html += "onchange='saveAccBookingRef(\"" + escJs(leg.id) + "\",this.value)'>";
    html += "</div>";
    opts.forEach(function(a) {
      var isConfirmed = confirmedId === a.id;
      html += "<div class='acc-card" + (isConfirmed ? " confirmed" : "") + "'>";
      html += "<div style='display:flex;align-items:flex-start;justify-content:space-between;gap:8px'>";
      html += "<div class='acc-name'>" + escHtml(a.name) + (isConfirmed ? " <span class='acc-confirmed-label'>✓ Confirmed</span>" : "") + "</div>";
      if (a.rating) html += "<div style='font-size:12px;color:var(--amber)'>⭐ " + a.rating + "</div>";
      html += "</div>";
      html += "<div class='acc-meta'>";
      if (a.price_night) html += "<span class='acc-price'>" + a.price_night + " " + (a.price_currency || "") + "/night</span>";
      html += confBadge(a.confidence);
      html += "</div>";
      if (a.notes) html += "<div style='font-size:12px;color:var(--muted);margin-bottom:8px'>" + escHtml(a.notes) + "</div>";
      html += "<div style='display:flex;gap:8px;flex-wrap:wrap;align-items:center'>";
      if (a.url) { html += "<a href='" + escHtml(a.url) + "' target='_blank' class='btn-sm' style='text-decoration:none'>🔗 Book</a>"; }
      else { html += googleMapsBtn(a.name, leg.name); }
      html += mapBtn(a.lat, a.lng, a.name);
      if (!isConfirmed) {

/* ============================================================
   MAP
   ============================================================ */
function renderMap() {
  var mapEl = document.getElementById("mainMap");
  if (!mapEl) return;

  if (!leafletMap) {
    var legs = TPG.legs || [];
    var centerLat = legs.length ? legs[0].geo.center_lat : 41.9;
    var centerLng = legs.length ? legs[0].geo.center_lng : 12.5;
    leafletMap = L.map("mainMap").setView([centerLat, centerLng], 12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© <a href='https://openstreetmap.org'>OSM</a>",
      maxZoom: 19
    }).addTo(leafletMap);
  }

  Object.keys(mapLayers).forEach(function(k) {
    leafletMap.removeLayer(mapLayers[k]);
  });
  mapLayers = {};

  var legs = getFilteredLegs();
  var bounds = [];

  var catColors = {
    restaurants: "#E74C3C",
    excursions: "#2D7D52",
    attractions: "#8E44AD",
    museums: "#1A6B8A",
    parks: "#00838F",
    zones: "#9B59B6",
    accommodation: "#F39C12"
  };

  var layerGroups = {};
  var secs = TPG.meta.enabled_sections || [];

  secs.forEach(function(sec) {
    if (sec === "map" || sec === "calendar" || sec === "logistics" || sec === "events" || sec === "notes") return;
    var group = L.layerGroup();
    var color = catColors[sec] || "#555";
    legs.forEach(function(leg) {
      (leg[sec] || []).forEach(function(item) {
        if (!item.lat || !item.lng) return;
        var marker = L.circleMarker([item.lat, item.lng], {
          radius: 9, fillColor: color, color: "#fff",
          weight: 2, opacity: 1, fillOpacity: 0.9
        });
        var popupHtml = "<div class='map-popup-title'>" + escHtml(item.name || item.title || "") + "</div>" +
          "<div class='map-popup-cat' style='color:" + color + "'>" + SECTION_LABELS[sec] + " — " + escHtml(leg.name) + "</div>";
        if (item.notes || item.body) {
          popupHtml += "<div class='map-popup-meta'>" + escHtml((item.notes || item.body || "").substring(0, 80)) + "</div>";
        }
        marker.bindPopup(popupHtml);
        bounds.push([item.lat, item.lng]);
        group.addLayer(marker);
      });
    });
    layerGroups[sec] = group;
    group.addTo(leafletMap);
  });

  mapLayers = layerGroups;

  if (bounds.length > 1) {
    leafletMap.fitBounds(bounds, { padding: [30, 30] });
  } else if (bounds.length === 1) {
    leafletMap.setView(bounds[0], 14);
  } else if (legs.length > 0) {
    leafletMap.setView([legs[0].geo.center_lat, legs[0].geo.center_lng], legs[0].geo.zoom_default || 12);
  }

  setTimeout(function() { leafletMap.invalidateSize(); }, 100);

  var sidebar = document.getElementById("mapSidebar");
  var btnHtml = "<div style='font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.08em;margin-bottom:8px'>Layers</div>";
  Object.keys(layerGroups).forEach(function(sec) {
    var color = catColors[sec] || "#555";
    btnHtml += "<button class='map-layer-btn on' id='ml-" + sec + "' onclick='toggleMapLayers(\"" + sec + "\")'>" +
      "<span style='display:inline-block;width:8px;height:8px;border-radius:50%;background:" + color + ";margin-right:6px'></span>" +
      SECTION_LABELS[sec] + "</button>";
  });
  sidebar.innerHTML = btnHtml;
}

function toggleMapLayers(sec) {
  var btn = document.getElementById("ml-" + sec);
  if (!btn) return;
  btn.classList.toggle("on");
  var isOn = btn.classList.contains("on");
  if (!leafletMap || !mapLayers[sec]) return;
  if (isOn) mapLayers[sec].addTo(leafletMap);
  else leafletMap.removeLayer(mapLayers[sec]);
}

function jumpMap(lat, lng, name) {
  showTab("map");
  setTimeout(function() {
    if (leafletMap) {

  }, 300);
}

/* ============================================================
   UTILS
   ============================================================ */
function escHtml(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function escJs(str) {
  if (!str) return "";
  return String(str).replace(/\\/g, "\\\\").replace(/"/g, '\\"').replace(/'/g, "\\'");
}

function uniqueVals(arr, field) {
  var seen = {};
  var out = [];
  arr.forEach(function(item) {
    var v = item[field];
    if (v && !seen[v]) { seen[v] = 1; out.push(v); }
  });
  return out;
}

/* ============================================================
   CALENDAR TOGGLE — check/add item to a day slot
   ============================================================ */
function findItemInCalendar(itemName) {
  /* Returns array of {key, slot} where item name appears in calendar slots */
  var cal = TPG.calendar || {};
  var results = [];
  var needle = (itemName || "").toLowerCase();
  if (!needle) return results;
  Object.keys(cal).sort().forEach(function(k) {
    var slots = cal[k].slots || {};
    ["morning","lunch","afternoon","dinner","evening"].forEach(function(sk) {
      var sv = slots[sk];
      var text = "";
      if (typeof sv === "string") text = sv;
      else if (sv && typeof sv === "object") {
        text = (sv.text || "") + " " + ((sv.items||[]).map(function(it){return it.name||"";}).join(" "));
      }
      var ov = getOverride("cal_" + k);
      if (ov.slots && ov.slots[sk] !== undefined) {
        var ovSv = ov.slots[sk];
        if (typeof ovSv === "string") text += " " + ovSv;
        else if (ovSv && typeof ovSv === "object") text += " " + (ovSv.text || "");
      }
      if (text.toLowerCase().indexOf(needle) !== -1) {
        results.push({ key: k, slot: sk });
      }
    });
  });
  return results;
}

function calBadgeBtn(itemName, itemId) {

    var labels = found.map(function(f) { return f.key + " (" + (SLOT_LABELS[f.slot]||f.slot) + ")"; }).join(", ");

}

function openCalPickerModal(itemName, itemId) {
  var cal = TPG.calendar || {};
  var keys = Object.keys(cal).sort().filter(function(k) {
    if (currentLegFilter === "all") return true;
    return cal[k].leg_id === currentLegFilter;
  });
  var found = findItemInCalendar(itemName);
  var foundMap = {};
  found.forEach(function(f) { foundMap[f.key + "_" + f.slot] = true; });

  var slotOpts = ["morning","lunch","afternoon","dinner","evening"].map(function(sk) {
    return "<option value='" + sk + "'>" + (SLOT_LABELS[sk]||sk) + "</option>";
  }).join("");

  var html = "<div style='font-size:13px;font-weight:700;margin-bottom:12px'>📅 " + escHtml(itemName) + "</div>";

  if (found.length) {
    html += "<div style='font-size:11px;color:var(--green);font-weight:700;margin-bottom:8px'>✅ Già presente in:</div>";
    html += "<ul style='font-size:12px;color:var(--muted);margin:0 0 12px 16px;line-height:2'>";
    found.forEach(function(f) {
      html += "<li>" + f.key + " — " + (SLOT_LABELS[f.slot]||f.slot) + "</li>";
    });

function assignRestToSlot(dayKey, slotKey, restName) {
  var cal = TPG.calendar || {};
  var day = cal[dayKey];
  if (!day) return;
  var rawSlot = day.slots && day.slots[slotKey];
  var ov = getOverride("cal_" + dayKey);
  if (!ov.slots) ov.slots = {};
  /* Replace or set the slot text with the restaurant name, keeping existing prefix if any */
  var curText = "";
  var ovSv = ov.slots[slotKey];
  if (ovSv !== undefined) {
    curText = typeof ovSv === "string" ? ovSv : (ovSv.text || "");
  } else {
    curText = typeof rawSlot === "string" ? rawSlot : ((rawSlot && rawSlot.text) || "");
  }
  /* Check if already in slot text */
  if (curText.toLowerCase().indexOf(restName.toLowerCase()) === -1) {

function processCsvImport(file) {
  var reader = new FileReader();
  reader.onload = function(ev) {
    var r = parseCsvToItems(ev.target.result, file.name);
    var el = document.getElementById("csvStatus");
    if (!el) return;
    if (r.count === 0) { el.innerHTML = "<div style='background:#FEE2E2;color:#991B1B;padding:6px 10px;border-radius:6px'>Nessun elemento trovato. Verifica intestazioni (nome, tipo, note, url).</div>"; return; }
    el.innerHTML = "<div style='background:#D1FAE5;color:#065F46;padding:6px 10px;border-radius:6px'>✓ " + r.count + " elementi importati in: " + r.sections.join(", ") + "</div>";
  };
  reader.readAsText(file);
}

function parseCsvToItems(text, source) {
  var lines = text.split(/\n|\r\n|\r/).filter(function(l){return l.trim();});
  if (lines.length < 2) return {count:0,sections:[]};
  var sep = lines[0].indexOf(";") !== -1 ? ";" : ",";
  var hdrs = lines[0].split(sep).map(function(h){return h.trim().toLowerCase().replace(/["']/g,"");});
  var nIdx=hdrs.findIndex(function(h){return/nome|name|titolo|title/.test(h);}); if(nIdx<0)nIdx=0;
  var tIdx=hdrs.findIndex(function(h){return/tipo|type/.test(h);});
  var noteIdx=hdrs.findIndex(function(h){return/note|desc/.test(h);});
  var urlIdx=hdrs.findIndex(function(h){return/url|link|sito/.test(h);});
  var prIdx=hdrs.findIndex(function(h){return/prezzo|price/.test(h);});
  var adIdx=hdrs.findIndex(function(h){return/indirizzo|address|addr/.test(h);});
  var catIdx=hdrs.findIndex(function(h){return/categoria|category/.test(h);});

  var count=0; var sections=[];
  for (var i=1; i<lines.length && count<300; i++) {
    var cols = splitCsvLine(lines[i], sep);
    var name = (cols[nIdx]||"").trim(); if (!name) continue;
    var rawType = tIdx>=0?(cols[tIdx]||"").toLowerCase().trim():"excursion";
    var type = normalizeItemType(rawType);
    var item = { name:name, notes:noteIdx>=0?(cols[noteIdx]||"").trim():"", url:urlIdx>=0?(cols[urlIdx]||"").trim():"", _custom:true, _id:Date.now()+Math.random(), source:"csv_import", source_label:source, confidence:"medium" };
    if (prIdx>=0&&cols[prIdx]) item.price_range=cols[prIdx].trim();
    if (adIdx>=0&&cols[adIdx]) item.addr=cols[adIdx].trim();
    if (catIdx>=0&&cols[catIdx]) item.category=cols[catIdx].trim();
    var arr=customLoad(type); arr.push(item); customSave(type,arr);
    if (sections.indexOf(SECTION_LABELS[type]||type)<0) sections.push(SECTION_LABELS[type]||type);
    count++;
  }
  return {count:count, sections:sections};
}

function splitCsvLine(line, sep) {
  var cols=[]; var cur=""; var inQ=false;
  for(var i=0;i<line.length;i++){var c=line[i];if(c==='"'){inQ=!inQ;}else if(c===sep&&!inQ){cols.push(cur.replace(/^"|"$/g,"").trim());cur="";}else cur+=c;}
  cols.push(cur.replace(/^"|"$/g,"").trim()); return cols;
}

function normalizeItemType(t) {
  if (/rest|ristor|food|cafe|coffee|bar/.test(t)) return "restaurants";
  if (/mus|galleria|gallery/.test(t)) return "museums";
  if (/hotel|alberg|hostel|acc/.test(t)) return "accommodation";
  if (/log|info|trasport|bus|taxi/.test(t)) return "logistics";
  if (/park|parco|garden/.test(t)) return "parks";
  if (/event|festival/.test(t)) return "events";
  if (/zone|zona|district/.test(t)) return "zones";
  return "excursions";
}

function processJsonImport(file) {
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var d = JSON.parse(ev.target.result); var count=0;
      if (d.legs) {
        d.legs.forEach(function(srcLeg) {
          ["restaurants","excursions","museums","parks","logistics","events","zones"].forEach(function(field) {
            (srcLeg[field]||[]).forEach(function(item){var arr=customLoad(field);arr.push(Object.assign({},item,{_custom:true,_id:Date.now()+Math.random()}));customSave(field,arr);count++;});
          });
        });
      } else if (Array.isArray(d)) {
        d.forEach(function(item){var t=normalizeItemType(item.type||"");var arr=customLoad(t);arr.push(Object.assign({},item,{_custom:true,_id:Date.now()+Math.random()}));customSave(t,arr);count++;});
      }
      var el=document.getElementById("jsonStatus");
      if(el) el.innerHTML="<div style='background:#D1FAE5;color:#065F46;padding:6px 10px;border-radius:6px'>✓ "+count+" elementi importati da "+file.name+"</div>";
      /* Restore custom journeys from backup if present */
      if (d._custom_journeys && Array.isArray(d._custom_journeys)) {
        saveCustomJourneys(d._custom_journeys);
      }
    } catch(err) {
      var el=document.getElementById("jsonStatus");
      if(el) el.innerHTML="<div style='background:#FEE2E2;color:#991B1B;padding:6px 10px;border-radius:6px'>Errore: "+err.message+"</div>";
    }
  };
  reader.readAsText(file);
}

var JB_KEY_BIN  = "tpg_jb_bin_id";
var JB_KEY_API  = "tpg_jb_api_key";
var JB_BASE     = "https://api.jsonbin.io/v3";
var jbBinId     = localStorage.getItem("tpg_jb_bin_id")  || "";
var jbApiKey    = localStorage.getItem("tpg_jb_api_key") || "";
var jbSyncing   = false;
var jbAutoTimer = null;

function syncAction() {
  if (!jbBinId || !jbApiKey) jbShowSetup(); else jbShowMenu();
}
function jbAutoSave() {
  if (!jbBinId || !jbApiKey) return;
  clearTimeout(jbAutoTimer);
  jbAutoTimer = setTimeout(function() { jbPush(true); }, 4000);
}
function jbPush(silent) {
  if (!jbBinId || !jbApiKey || jbSyncing) return;
  jbSyncing = true;
  var payload = { _updated: new Date().toISOString(), data: { overrides: TPG_OVERRIDES, custom: {}, notes: notesLoad() } };
  Object.keys(CUSTOM_KEYS).forEach(function(k){ payload.data.custom[k] = customLoad(k); });
  fetch(JB_BASE + "/b/" + jbBinId, { method:"PUT", headers:{"Content-Type":"application/json","X-Master-Key":jbApiKey}, body:JSON.stringify(payload) })
    .then(function(){ jbSyncing=false; if(!silent) showSaveOk(); })
    .catch(function(){ jbSyncing=false; });
}
function jbPull() {
  if (!jbBinId || !jbApiKey || jbSyncing) return;
  jbSyncing = true; closeModal();
  fetch(JB_BASE + "/b/" + jbBinId + "/latest", { headers:{"X-Master-Key":jbApiKey} })
    .then(function(r){ return r.json(); })
    .then(function(res) {
      var remote = (res.record && res.record.data) ? res.record.data : null;
      if (remote) {
        if (remote.overrides) TPG_OVERRIDES = remote.overrides;
        if (remote.custom) Object.keys(remote.custom).forEach(function(k){ if(CUSTOM_KEYS[k])localStorage.setItem(CUSTOM_KEYS[k],JSON.stringify(remote.custom[k])); });
        if (remote.notes) localStorage.setItem(NOTES_KEY, JSON.stringify(remote.notes));
        showSaveOk();
        if (currentTab) showTab(currentTab);
      }
      jbSyncing = false;
    })
    .catch(function(){ jbSyncing = false; });
}
function jbCreateBin(cb) {
  fetch(JB_BASE + "/b", { method:"POST", headers:{"Content-Type":"application/json","X-Master-Key":jbApiKey,"X-Bin-Name":"TravelPlanner","X-Bin-Private":"true"}, body:JSON.stringify({_created:new Date().toISOString(),data:{overrides:{},custom:{},notes:{}}}) })
    .then(function(r){ return r.json(); })
    .then(function(res){ if(res.metadata&&res.metadata.id){jbBinId=res.metadata.id;localStorage.setItem("tpg_jb_bin_id",jbBinId);cb(true);}else cb(false); })
    .catch(function(){ cb(false); });
}

  var html = "<p style='font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:14px'>Usa <strong>JSONBin.io</strong> — gratuito. Vai su <a href='https://jsonbin.io' target='_blank' style='color:var(--accent)'>jsonbin.io</a> → Sign Up → Account Settings → copia la <strong>Secret Key</strong>.</p>" +
    "<div style='margin-bottom:10px'><label style='font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;display:block;margin-bottom:4px'>API Secret Key</label><input id='jbKeyIn' type='password' placeholder='$2b$10$...' value='" + escHtml(jbApiKey) + "' style='width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--sans);background:var(--bg3);color:var(--ink)'></div>" +

function exportJSONPlanner() {
  if (!TPG) return;
  var out = JSON.parse(JSON.stringify(TPG));
  out._user_overrides = TPG_OVERRIDES;
  out._custom_items = {};
  Object.keys(CUSTOM_KEYS).forEach(function(k){out._custom_items[k]=customLoad(k);});
  out._custom_journeys = loadCustomJourneys();
  out._item_notes = notesLoad();
  var blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=(TPG.meta.title||"planner").toLowerCase().replace(/\s+/g,"_")+"_backup.json";a.click();
}

function exportCSVPlanner() {
  if (!TPG) return;
  var cal=TPG.calendar||{}; var keys=Object.keys(cal).sort();
  var rows=[["Date","Leg","Type","Morning","Lunch","Afternoon","Dinner","Evening"]];
  keys.forEach(function(k){
    var d=cal[k]; var s=d.slots||{};
    function gt(sv){if(!sv)return"";if(typeof sv==="string")return sv;return sv.text||"";}
    rows.push([k,d.leg_id||"",d.type||"normal",gt(s.morning),gt(s.lunch),gt(s.afternoon),gt(s.dinner),gt(s.evening)]);
  });
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
  var blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="calendario_"+((TPG.meta.title||"planner").replace(/\s+/g,"_"))+".csv";a.click();
}

function exportPDF() {
  if (!TPG) return;
  var meta = TPG.meta || {};
  var trip = TPG.trip || {};
  var title = meta.title || "Travel Plan";
  var cal = TPG.calendar || {};
  var calKeys = Object.keys(cal).sort();
  var legs = TPG.legs || [];

  /* Helper */
  function esc(s) { return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function slotTxt(sv) { if (!sv) return ""; if (typeof sv === "string") return sv; return sv.text || ""; }
  function slotItems(sv) { if (!sv || typeof sv === "string") return []; return sv.items || []; }
  var slotKeys = ["morning","lunch","afternoon","dinner","evening"];
  var slotLabels = { morning:"Morning", lunch:"Lunch", afternoon:"Afternoon", dinner:"Dinner", evening:"Evening" };
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var weekdays = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'>";
  html += "<title>" + esc(title) + "</title>";
  html += "<style>";
  html += "body{font-family:Georgia,serif;font-size:11pt;color:#111;margin:0;padding:0}";
  html += ".cover{padding:60px 40px;border-bottom:3px solid #333;margin-bottom:30px}";
  html += ".cover h1{font-size:28pt;margin:0 0 8px}";
  html += ".cover p{font-size:12pt;color:#555;margin:4px 0}";
  html += ".day-block{page-break-inside:avoid;padding:16px 40px;border-bottom:1px solid #ddd}";
  html += ".day-date{font-size:13pt;font-weight:700;color:#111;margin-bottom:4px}";
  html += ".day-leg{font-size:9pt;color:#666;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}";
  html += ".slot-label{font-size:8pt;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#888;margin-bottom:2px}";
  html += ".slot-text{font-size:10pt;margin-bottom:2px;line-height:1.5}";
  html += ".slot-item{display:flex;gap:10px;margin:2px 0;font-size:10pt}";
  html += ".slot-time{color:#666;font-family:monospace;min-width:40px}";
  html += ".logistics-section{padding:30px 40px;page-break-before:always}";
  html += ".logistics-section h2{font-size:16pt;border-bottom:2px solid #333;padding-bottom:6px;margin-bottom:16px}";
  html += ".log-cat{font-size:10pt;font-weight:700;text-transform:uppercase;color:#555;margin:14px 0 6px}";
  html += ".log-item{margin-bottom:10px;padding:8px 12px;border-left:3px solid #ddd}";
  html += ".log-title{font-weight:700;margin-bottom:2px}";
  html += ".log-body{font-size:10pt;color:#333;line-height:1.5}";
  html += "@media print{body{margin:0}@page{margin:15mm}}";
  html += "</style></head><body>";

  /* Cover */
  html += "<div class='cover'><h1>" + esc(title) + "</h1>";
  html += "<p>" + esc(trip.start_date || "") + " → " + esc(trip.end_date || "") + " · " + (trip.total_days || "") + " days</p>";
  if (legs.length) html += "<p>Legs: " + legs.map(function(l){return esc(l.name);}).join(" → ") + "</p>";
  html += "</div>";

  /* Calendar */
  calKeys.forEach(function(k) {
    var day = cal[k];
    var d = new Date(k + "T00:00:00");
    var dateStr = weekdays[d.getDay()] + " " + d.getDate() + " " + months[d.getMonth()] + " " + d.getFullYear();
    var leg = legs.find(function(l){return l.id === day.leg_id;});
    var legName = leg ? leg.name : (day.leg_id || "");
    var slots = day.slots || {};
    var hasContent = slotKeys.some(function(sk){ return slotTxt(slots[sk]) || slotItems(slots[sk]).length; });
    if (!hasContent) return;
    html += "<div class='day-block'>";
    html += "<div class='day-date'>" + esc(dateStr) + "</div>";
    if (legName) html += "<div class='day-leg'>" + esc(legName) + "</div>";
    slotKeys.forEach(function(sk) {
      var sv = slots[sk];
      var txt = slotTxt(sv);
      var items = slotItems(sv);
      if (!txt && !items.length) return;
      html += "<div style='margin-bottom:8px'><div class='slot-label'>" + (slotLabels[sk]||sk) + "</div>";
      if (txt) html += "<div class='slot-text'>" + esc(txt) + "</div>";
      items.forEach(function(it) {
        if (!it.activity) return;
        html += "<div class='slot-item'><span class='slot-time'>" + esc(it.time||"") + "</span><span>" + esc(it.activity) + (it.duration_min ? " (" + Math.round(it.duration_min/60*10)/10 + "h)" : "") + "</span></div>";
      });
      html += "</div>";
    });
    html += "</div>";
  });

  /* Logistics */
  var logItems = [];
  legs.forEach(function(leg) { (leg.logistics||[]).forEach(function(l){ logItems.push(Object.assign({},l,{_legName:leg.name})); }); });
  if (logItems.length) {
    var catOrder = ["local_transport","transport","health","permits","money","connectivity","safety","other"];
    var catLabels = { local_transport:"Local Transport", transport:"Transport", health:"Health", permits:"Permits", money:"Money & ATMs", connectivity:"Connectivity", safety:"Safety", other:"Other" };
    var grouped = {};
    logItems.forEach(function(l){ var c=l.category||"other"; if(!grouped[c])grouped[c]=[]; grouped[c].push(l); });
    html += "<div class='logistics-section'><h2>📋 Logistics & Useful Info</h2>";
    catOrder.forEach(function(cat) {
      if (!grouped[cat] || !grouped[cat].length) return;
      html += "<div class='log-cat'>" + (catLabels[cat]||cat) + "</div>";
      grouped[cat].forEach(function(l) {
        html += "<div class='log-item'><div class='log-title'>" + esc(l.title) + "</div>";
        html += "<div class='log-body'>" + esc(l.body) + "</div></div>";
      });
    });
    /* Emergency contacts */
    var contacts = trip.emergency_contacts || [];
    if (contacts.length) {
      html += "<div class='log-cat'>🆘 Emergency Contacts</div>";
      contacts.forEach(function(c) {
        html += "<div class='log-item'><div class='log-title'>" + esc(c.label) + " — " + esc(c.phone) + "</div>";
        if (c.notes) html += "<div class='log-body'>" + esc(c.notes) + "</div>";
        html += "</div>";
      });
    }
    html += "</div>";
  }

  html += "</body></html>";

  /* Apri in nuova finestra e stampa */
  var win = window.open("", "_blank");
  if (!win) { alert("Please allow popups to export PDF."); return; }
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(function() { win.print(); }, 400);
}

  var title = (editIdx !== undefined ? "Modifica" : "Aggiungi") + " marker sulla mappa";
  var html =
    "<div class='form-group'><label>Nome *</label><input id='mk_name' type='text' placeholder='es. Ristorante preferito' value='" + escHtml(ex ? ex.name || "" : "") + "' style='width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--sans);background:var(--bg3);color:var(--ink)'></div>" +
    "<div class='form-group'><label>Latitudine * <span style='font-size:10px;color:var(--text3)'>(da Google Maps)</span></label><input id='mk_lat' type='number' step='0.0001' placeholder='es. 14.5995' value='" + (ex ? ex.lat || "" : "") + "' style='width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--sans);background:var(--bg3);color:var(--ink)'></div>" +
    "<div class='form-group'><label>Longitudine * <span style='font-size:10px;color:var(--text3)'>(da Google Maps)</span></label><input id='mk_lng' type='number' step='0.0001' placeholder='es. 120.9842' value='" + (ex ? ex.lng || "" : "") + "' style='width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--sans);background:var(--bg3);color:var(--ink)'></div>" +
    "<div class='form-group'><label>Colore marker</label><select id='mk_color' style='width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--sans);background:var(--bg3);color:var(--ink)'>" +
    ["#E91E63","#1A6B8A","#2D7D52","#F4A838","#6B46C1"].map(function(c){var isSelected=(ex&&ex.color===c)?" selected":"";return "<option value='"+c+"'"+isSelected+">"+c+"</option>";}).join("") +
    "</select></div>" +
    "<div class='form-group'><label>Note</label><textarea id='mk_note' rows='2' style='width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--sans);background:var(--bg3);color:var(--ink);resize:vertical'>" + escHtml(ex ? ex.note || "" : "") + "</textarea></div>" +
    "<div class='form-group'><label>URL</label><input id='mk_url' type='text' placeholder='https://...' value='" + escHtml(ex ? ex.url || "" : "") + "' style='width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--sans);background:var(--bg3);color:var(--ink)'></div>" +
    "<div style='font-size:11px;color:var(--text3);margin-bottom:10px'>💡 Per lat/lng: apri Google Maps → clicca sul posto → copia i numeri dal basso (es. 14.5995, 120.9842)</div>" +
    "<div class='modal-actions'><button class='btn-cancel' onclick='closeModal()'>Cancel</button><button class='btn-save' onclick='saveMarkerV3(" + (editIdx !== undefined ? editIdx : "undefined") + ")'>💾 Salva</button></div>";
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = html;
  document.getElementById("modalOverlay").classList.add("show");
}

function saveMarkerV3(editIdx) {
  var name  = (document.getElementById("mk_name")  || {}).value.trim();
  var lat   = parseFloat((document.getElementById("mk_lat")   || {}).value);
  var lng   = parseFloat((document.getElementById("mk_lng")   || {}).value);
  var color = (document.getElementById("mk_color") || {}).value || "#E91E63";
  var note  = (document.getElementById("mk_note")  || {}).value.trim();
  var url   = (document.getElementById("mk_url")   || {}).value.trim();
  if (!name || isNaN(lat) || isNaN(lng)) { alert("Nome, latitudine e longitudine sono obbligatori."); return; }
  var marker = { name: name, lat: lat, lng: lng, color: color, note: note, url: url, _custom: true, _id: Date.now() };
  var arr = customLoad("markers");
  if (editIdx !== undefined && editIdx !== null) arr[editIdx] = marker; else arr.push(marker);
  customSave("markers", arr);
  closeModal();
  /* Refresh map if visible */
  if (currentTab === "map") renderMap();
}

function delMarkerV3(idx) {
  if (!confirm("Eliminare questo marker?")) return;
  var arr = customLoad("markers"); arr.splice(idx, 1); customSave("markers", arr);
  if (currentTab === "map") renderMap();
}


function editItem(key,idx){openCustomModal(key,idx);}
function delItem(key,idx){customDel(key,idx);}
/* ============================================================
   BOOT
   ============================================================ */
(function() {
  var saved = localStorage.getItem("tpg_theme");
  if (saved === "dark") {
    isDark = true;
    document.documentElement.classList.add("dark");
    document.getElementById("themeBtn").textContent = "☀️";
  }
})();

var origToggle = toggleTheme;
toggleTheme = function() {
  origToggle();
  localStorage.setItem("tpg_theme", isDark ? "dark" : "light");
};
</script>
</body>
</html>
