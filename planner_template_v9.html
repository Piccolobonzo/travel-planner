<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Planner</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ============================================================
   TOKENS
   ============================================================ */
:root {
  --bg:       #FAF8F5;
  --bg2:      #FFFFFF;
  --bg3:      #F2EFE9;
  --border:   #E4DDD4;
  --ink:      #1C1917;
  --muted:    #78716C;
  --muted2:   #A8A29E;
  --accent:   #1A6B8A;
  --accent2:  #2D9CBF;
  --green:    #2D7D52;
  --amber:    #B45309;
  --red:      #C0392B;
  --card:     #FFFFFF;
  --shadow:   0 1px 4px rgba(0,0,0,.08);
  --radius:   8px;
  --radius2:  12px;
  --sans:     -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono:     'Courier New', Courier, monospace;
}
html.dark {
  --bg:       #0F1117;
  --bg2:      #171B26;
  --bg3:      #1E2330;
  --border:   #2A3040;
  --ink:      #E8E3DC;
  --muted:    #9B9287;
  --muted2:   #5A6278;
  --accent:   #3B9ABF;
  --accent2:  #5BB8D4;
  --green:    #3DA86A;
  --amber:    #D97706;
  --red:      #E05555;
  --card:     #1A1D26;
}

/* ============================================================
   RESET
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
*, *::before, *::after { transition: background-color .2s, border-color .2s, color .1s; }
html { scroll-behavior: smooth; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); min-height: 100vh; font-size: 14px; line-height: 1.5; }

/* ============================================================
   DROP ZONE (initial state)
   ============================================================ */
#dropZone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 20px;
  text-align: center;
  gap: 20px;
}
.drop-box {
  border: 2px dashed var(--border);
  border-radius: var(--radius2);
  padding: 60px 80px;
  background: var(--bg2);
  cursor: pointer;
  transition: all .2s;
  max-width: 480px;
  width: 100%;
}
.drop-box:hover, .drop-box.dragover {
  border-color: var(--accent);
  background: rgba(27,107,138,.05);
}
.drop-icon { font-size: 48px; margin-bottom: 16px; }
.drop-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--ink); }
.drop-sub { font-size: 13px; color: var(--muted); }
.drop-btn {
  margin-top: 16px;
  padding: 10px 24px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--sans);
}
.drop-btn:hover { opacity: .85; }
.drop-examples {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 480px;
}
.drop-example {
  padding: 6px 14px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  color: var(--muted);
}
#fileInput { display: none; }
.drop-error { color: var(--red); font-size: 13px; }

/* ============================================================
   APP LAYOUT
   ============================================================ */
#app { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
#app.visible { display: flex; }

/* TOPBAR */
.topbar {
  background: var(--accent);
  color: white;
  padding: 0 16px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 50;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.topbar-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
.topbar-title { font-size: 15px; font-weight: 700; letter-spacing: -.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-dates { font-size: 11px; opacity: .75; white-space: nowrap; }
.topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.topbar-btn {
  background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.25);
  color: white;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
  font-family: var(--sans);
  font-weight: 600;
  white-space: nowrap;
}
.topbar-btn:hover { background: rgba(255,255,255,.25); }

/* LEG SELECTOR BAR */
.leg-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 6px 12px;
  display: none;
  gap: 6px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.leg-bar.visible { display: flex; }
.leg-pill {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all .15s;
  background: var(--bg3);
  color: var(--muted);
}
.leg-pill.active { color: white; }
.leg-pill:hover { opacity: .85; }

/* TABS */
.tabs {
  background: var(--bg2);
  border-bottom: 2px solid var(--border);
  display: flex;
  padding: 0 12px;
  gap: 2px;
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
  z-index: 10;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 9px 14px;
  border: none;
  background: none;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all .15s;
}
.tab:hover { color: var(--accent); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* BODY */
.body { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
.sidebar-header {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-search {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 12px;
  background: var(--bg3);
  color: var(--ink);
  font-family: var(--sans);
  outline: none;
}
.sidebar-search:focus { border-color: var(--accent); }
.sidebar-list { flex: 1; overflow-y: auto; padding: 6px; }
.day-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .12s;
}
.day-item:hover { background: var(--bg3); }
.day-item.active { background: rgba(27,107,138,.1); }
.day-stripe { width: 4px; height: 32px; border-radius: 2px; flex-shrink: 0; }
.day-item-date { font-family: var(--mono); font-size: 10px; color: var(--muted); width: 46px; flex-shrink: 0; }
.day-item-label { font-size: 12px; font-weight: 600; flex: 1; min-width: 0; }
.day-item-type { font-size: 9px; padding: 2px 5px; border-radius: 3px; flex-shrink: 0; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
.type-rest { background: #FEF3C7; color: #92400E; }
.type-transfer { background: #DBEAFE; color: #1E40AF; }
.type-normal { background: var(--bg3); color: var(--muted); }
.type-flexible { background: #D1FAE5; color: #065F46; }
html.dark .type-rest { background: rgba(251,191,36,.15); color: #FCD34D; }
html.dark .type-transfer { background: rgba(96,165,250,.15); color: #93C5FD; }
html.dark .type-normal { background: var(--bg3); color: var(--muted); }
html.dark .type-flexible { background: rgba(52,211,153,.15); color: #6EE7B7; }

/* MAIN PANEL */
.main-panel { flex: 1; overflow-y: auto; padding: 0; background: var(--bg); }

/* DAY VIEW */
.day-view { padding: 20px; max-width: 700px; }
.day-header { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.day-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.day-nav-center { flex: 1; min-width: 0; }
.day-nav-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 16px; color: var(--ink); font-family: var(--sans); flex-shrink: 0; transition: all .15s; }
.day-nav-btn:hover:not(:disabled) { background: var(--accent); color: white; border-color: var(--accent); }
.day-nav-btn:disabled { opacity: .3; cursor: default; }
.day-title { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
.day-meta { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.day-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.day-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
.badge-leg { color: white; }
.slot-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; box-shadow: var(--shadow); }
.slot-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px 6px; background: var(--bg3); border-bottom: 1px solid var(--border); }
.slot-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
.slot-body { padding: 10px 12px; font-size: 13px; line-height: 1.6; min-height: 32px; color: var(--ink); }
.slot-body.empty { color: var(--muted2); font-style: italic; font-size: 12px; }
.slot-actions { padding: 4px 8px 8px; display: flex; gap: 6px; }
.btn-sm {
  padding: 4px 10px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--muted);
  font-family: var(--sans);
  transition: all .12s;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
.btn-rest-pick { border-color: rgba(180,83,9,.3); color: var(--amber); }
.btn-rest-pick:hover { background: var(--amber); color: white; border-color: var(--amber); }
.rest-pick-row { display:flex; align-items:center; gap:10px; padding:8px 10px; border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; background:var(--card); transition:all .12s; }
.rest-pick-row:hover { border-color:var(--accent); background:rgba(27,107,138,.05); }
.jm-seg { border-top: 1px dashed var(--border); padding-top: 4px; margin-top: 2px; }

/* PLACEHOLDER */
.placeholder { padding: 60px 40px; text-align: center; color: var(--muted); }
.placeholder-icon { font-size: 40px; margin-bottom: 12px; }
.placeholder-text { font-size: 14px; }

/* ============================================================
   CARDS (restaurants, excursions, etc.)
   ============================================================ */
.section-panel { padding: 20px; }
.section-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.section-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.fchip {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--muted);
  transition: all .12s;
}
.fchip:hover, .fchip.on { background: var(--accent); border-color: var(--accent); color: white; }

.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.card-name { font-size: 14px; font-weight: 700; line-height: 1.3; flex: 1; }
.card-cat { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--accent); padding: 2px 7px; background: rgba(27,107,138,.08); border-radius: 4px; white-space: nowrap; }
.card-meta { font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }
.card-body { font-size: 12px; color: var(--ink); line-height: 1.5; }
.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; flex-wrap: wrap; gap: 6px; }
.confidence-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
.conf-high { background: #D1FAE5; color: #065F46; }
.conf-medium { background: #FEF3C7; color: #92400E; }
.conf-low { background: #FEE2E2; color: #991B1B; }
html.dark .conf-high { background: rgba(52,211,153,.15); color: #6EE7B7; }
html.dark .conf-medium { background: rgba(251,191,36,.15); color: #FCD34D; }
html.dark .conf-low { background: rgba(239,68,68,.15); color: #FCA5A5; }
.permit-badge { font-size: 10px; font-weight: 700; background: #FEF3C7; color: #92400E; padding: 2px 7px; border-radius: 4px; }
.price-badge { font-size: 12px; font-weight: 700; color: var(--green); }
.difficulty-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; }
.diff-easy { background: #D1FAE5; color: #065F46; }
.diff-medium { background: #FEF3C7; color: #92400E; }
.diff-hard { background: #FEE2E2; color: #991B1B; }
html.dark .diff-easy { background: rgba(52,211,153,.15); color: #6EE7B7; }
html.dark .diff-medium { background: rgba(251,191,36,.15); color: #FCD34D; }
html.dark .diff-hard { background: rgba(239,68,68,.15); color: #FCA5A5; }
.card-note-area { margin-top: 6px; border-top: 1px solid var(--border); padding-top: 8px; display: none; }
.card-note-area.open { display: block; }
.card-note-input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 6px 8px;
  font-size: 12px;
  background: var(--bg3);
  color: var(--ink);
  font-family: var(--sans);
  resize: vertical;
  min-height: 52px;
  outline: none;
}
.card-note-input:focus { border-color: var(--accent); }
.btn-note { font-size: 10px; padding: 3px 8px; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); background: var(--bg3); color: var(--muted); font-family: var(--sans); font-weight: 600; }
.btn-addcal { border-color: var(--accent); color: var(--accent); }
.btn-addcal:hover { background: var(--accent); color: white; }
.active-incal { background: rgba(45,125,82,.12); border-color: var(--green); color: var(--green); }
.active-incal:hover { background: var(--green); color: white; }
.btn-note:hover { border-color: var(--accent); color: var(--accent); }
.btn-map { font-size: 10px; padding: 3px 8px; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); background: var(--bg3); color: var(--muted); font-family: var(--sans); font-weight: 600; }
.btn-map:hover { border-color: var(--accent2); color: var(--accent2); }

/* Logistics special */
.log-category-group { margin-bottom: 20px; }
.log-cat-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 8px; }
.log-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; box-shadow: var(--shadow); }
.log-card-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.log-card-body { font-size: 12px; color: var(--ink); line-height: 1.6; }
.log-card-footer { margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; }

/* Accommodation */
.acc-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; box-shadow: var(--shadow); }
.acc-card.confirmed { border-color: var(--green); background: rgba(45,125,82,.04); }
.acc-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.acc-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.acc-price { font-size: 14px; font-weight: 700; color: var(--green); }
.acc-confirmed-label { font-size: 11px; font-weight: 700; color: var(--green); padding: 2px 8px; background: rgba(45,125,82,.1); border-radius: 4px; }
.btn-confirm { padding: 6px 14px; background: var(--green); color: white; border: none; border-radius: var(--radius); font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--sans); }
.btn-confirm:hover { opacity: .85; }
.btn-unconfirm { padding: 6px 14px; background: var(--bg3); color: var(--muted); border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--sans); }
.btn-unconfirm:hover { border-color: var(--red); color: var(--red); }

/* Notes */
.notes-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
.notes-leg-name { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.notes-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.notes-text { font-size: 13px; line-height: 1.7; color: var(--ink); white-space: pre-wrap; }
.notes-user-area { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
.notes-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted2); margin-bottom: 6px; }
.notes-textarea { width: 100%; border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; font-size: 13px; background: var(--bg3); color: var(--ink); font-family: var(--sans); resize: vertical; min-height: 80px; outline: none; }
.notes-textarea:focus { border-color: var(--accent); }
.btn-save-note { margin-top: 6px; padding: 5px 14px; background: var(--accent); color: white; border: none; border-radius: 5px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: var(--sans); }
.btn-save-note:hover { opacity: .85; }
.saved-flash { font-size: 11px; color: var(--green); margin-left: 8px; opacity: 0; transition: opacity .3s; }
.saved-flash.show { opacity: 1; }

/* Map */
#mainMap { width: 100%; height: 100%; min-height: 400px; }
.map-container { display: flex; height: 100%; }
.map-sidebar { width: 200px; background: var(--bg2); border-right: 1px solid var(--border); padding: 12px; overflow-y: auto; flex-shrink: 0; }
.map-layer-btn { display: block; width: 100%; text-align: left; padding: 7px 10px; margin-bottom: 5px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--muted); font-family: var(--sans); transition: all .12s; }
.map-layer-btn.on { background: var(--accent); border-color: var(--accent); color: white; }
.map-area { flex: 1; }
.map-popup-title { font-weight: 700; font-size: 13px; margin-bottom: 3px; }
.map-popup-cat { font-size: 11px; margin-bottom: 4px; }
.map-popup-meta { font-size: 11px; color: #666; }

/* Events */
.event-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; display: flex; gap: 14px; box-shadow: var(--shadow); }
.event-date { text-align: center; min-width: 48px; }
.event-date-from { font-size: 11px; font-weight: 700; color: var(--accent); font-family: var(--mono); }
.event-date-to { font-size: 10px; color: var(--muted); font-family: var(--mono); }
.event-body { flex: 1; }
.event-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.event-location { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.event-desc { font-size: 12px; line-height: 1.5; }

/* Emergency contacts */
.emergency-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-top: 12px; }
.emergency-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
.emergency-label { font-size: 11px; font-weight: 700; margin-bottom: 2px; }
.emergency-phone { font-family: var(--mono); font-size: 13px; color: var(--accent); font-weight: 700; }
.emergency-notes { font-size: 11px; color: var(--muted); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2); padding: 24px; width: 100%; max-width: 460px; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal textarea { width: 100%; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; font-size: 13px; font-family: var(--sans); background: var(--bg3); color: var(--ink); resize: vertical; min-height: 90px; outline: none; }
.modal textarea:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.btn-cancel { padding: 7px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; cursor: pointer; color: var(--muted); font-family: var(--sans); }
.btn-cancel:hover { border-color: var(--red); color: var(--red); }
.btn-save { padding: 7px 16px; background: var(--accent); border: none; border-radius: var(--radius); font-size: 13px; font-weight: 700; cursor: pointer; color: white; font-family: var(--sans); }
.btn-save:hover { opacity: .85; }

/* Zones */
.zone-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; box-shadow: var(--shadow); }
.zone-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 4px; }
.zone-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.zone-desc { font-size: 12px; color: var(--ink); line-height: 1.5; }

/* Guide */
.guide-section-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin: 20px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.guide-section-sub { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }
.guide-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(240px,1fr)); gap: 12px; margin-bottom: 4px; }
.guide-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 14px; }
.guide-card-title { font-size: 13px; font-weight: 700; margin-bottom: 7px; }
.guide-card-body { font-size: 12px; color: var(--muted); line-height: 1.75; }
.guide-prompts-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(320px,1fr)); gap: 14px; }
.guide-prompt-block { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.guide-prompt-block-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.guide-prompt { background: var(--bg3); border: 1px dashed var(--border); border-radius: 6px; padding: 10px 12px; }
.guide-prompt-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; color: var(--accent); margin-bottom: 6px; }
.guide-prompt-text { font-size: 11.5px; color: var(--ink); line-height: 1.75; white-space: pre-wrap; font-family: var(--mono); }

/* Responsive */
@media print {
  body { background: #fff !important; color: #111 !important; }
  .topbar, .tab-bar, .sidebar, #dropZone, .slot-actions, .filter-row button,
  .modal-overlay, #modalOverlay, .map-view { display: none !important; }
  .main-layout { display: block !important; }
  .section-view, .day-view { display: block !important; width: 100% !important; }
  .card { break-inside: avoid; border: 1px solid #ddd !important; background: #fff !important; }
  .slot-card { break-inside: avoid; border: 1px solid #eee !important; background: #fff !important; }
  .acc-card { break-inside: avoid; border: 1px solid #ddd !important; background: #fff !important; }
  .log-card { break-inside: avoid; }
  a { color: #333 !important; text-decoration: none !important; }
  .day-header { border-bottom: 2px solid #333 !important; }
  :root { --bg:#fff; --bg2:#f8f8f8; --bg3:#f0f0f0; --text:#111; --text2:#444; --muted:#666; --border:#ccc; }
}

@media (max-width: 600px) {
  .sidebar { display: none; }
  .cards-grid { grid-template-columns: 1fr; }
  .map-sidebar { display: none; }
}

/* ============================================================
   JOURNEYS
   ============================================================ */
.journey-block { margin-bottom: 28px; }
.journey-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px; padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
}
.journey-direction {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--accent);
  background: rgba(27,107,138,.08); padding: 3px 10px; border-radius: 20px;
}
.journey-date { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.journey-label { font-size: 15px; font-weight: 700; }
.segment-timeline { position: relative; padding-left: 28px; }
.segment-timeline::before {
  content: '';
  position: absolute; left: 10px; top: 16px; bottom: 16px;
  width: 2px; background: var(--border);
}
.segment {
  position: relative; margin-bottom: 12px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  box-shadow: var(--shadow);
}
.segment::before {
  content: '';
  position: absolute; left: -22px; top: 18px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent); border: 2px solid var(--bg2);

}
.segment.confirmed::before { background: var(--green); box-shadow: 0 0 0 2px var(--green); }
.segment-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.segment-route { font-size: 14px; font-weight: 700; }
.segment-type-icon { font-size: 18px; flex-shrink: 0; }
.segment-times { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 4px; }

.segment-meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 11px; color: var(--muted); }

.segment-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.seg-confirmed-badge { font-size: 10px; font-weight: 700; color: var(--green); background: rgba(45,125,82,.1); padding: 2px 8px; border-radius: 4px; }
.btn-confirm-seg { padding: 4px 12px; background: var(--green); color: white; border: none; border-radius: 5px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: var(--sans); }
.btn-confirm-seg:hover { opacity: .85; }
.btn-unconfirm-seg { padding: 4px 12px; background: var(--bg3); color: var(--muted); border: 1px solid var(--border); border-radius: 5px; font-size: 11px; cursor: pointer; font-family: var(--sans); }

/* Journey mini-timeline in day view */
.day-journey-block {
  background: rgba(27,107,138,.05); border: 1px solid rgba(27,107,138,.2);
  border-radius: var(--radius); padding: 10px 12px; margin-bottom: 10px;
}
.day-journey-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
.day-seg-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }
.day-seg-time { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 40px; flex-shrink: 0; }
.day-seg-icon { font-size: 14px; flex-shrink: 0; }
.day-seg-route { flex: 1; font-weight: 600; }
.day-seg-carrier { font-size: 10px; color: var(--muted2); }

/* ============================================================
   SLOT ITEMS (structured calendar)
   ============================================================ */
.slot-items { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
.slot-item {
  display: flex; gap: 10px; padding: 8px 10px;
  background: var(--bg3); border-radius: 6px;
  border-left: 3px solid var(--border);
  font-size: 12px;
}
.slot-item-time { font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 700; width: 40px; flex-shrink: 0; padding-top: 1px; }
.slot-item-body { flex: 1; min-width: 0; }
.slot-item-activity { font-weight: 600; margin-bottom: 2px; }
.slot-item-desc { color: var(--muted); line-height: 1.5; font-size: 11px; }
.slot-item-footer { display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.slot-item-duration { font-size: 10px; color: var(--muted2); }
.slot-item-booking { font-size: 10px; font-weight: 700; color: var(--amber); background: rgba(180,83,9,.08); padding: 1px 6px; border-radius: 3px; }
.slot-item-link { font-size: 10px; color: var(--accent); text-decoration: none; }
.slot-item-link:hover { text-decoration: underline; }
.slot-item-clickable { cursor: pointer; }
.slot-item-clickable:hover { background: var(--bg3); border-radius: var(--radius); }
.slot-item-reorder { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
.slot-item-arrow { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; width: 18px; height: 14px; font-size: 9px; line-height: 1; cursor: pointer; color: var(--muted); padding: 0; }
.slot-item-arrow:hover:not(:disabled) { background: var(--accent); color: white; border-color: var(--accent); }
.slot-item-arrow:disabled { opacity: .25; cursor: default; }

/* Calendar style toggle */
.cal-style-toggle {
  display: flex; gap: 1px; background: var(--border); border-radius: 5px;
  overflow: hidden; width: fit-content; margin-bottom: 14px;
}
.cal-style-btn {
  padding: 4px 10px; font-size: 11px; font-weight: 600;

}

/* ============================================================
   SCROLLBAR

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.btn-add-item { background: var(--accent); color: white; border: none; border-radius: 6px; padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--sans); }

.btn-item-del  { background: rgba(224,85,85,.12); color: #E05555; border: 1px solid rgba(224,85,85,.3); border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; font-family: var(--sans); }
.placeholder-msg { padding: 24px; text-align: center; color: var(--text3); font-size: 13px; }
</style>

<body>

<!-- ============================================================
     DROP ZONE
============================================================ -->
<div id="dropZone">
  <div class="drop-box" id="dropBox" onclick="triggerFilePick()">
    <div class="drop-icon">🗺️</div>
    <div class="drop-title">Load your travel plan</div>
    <div class="drop-sub">Drop your JSON file here or click to browse</div>
    <button class="drop-btn" onclick="event.stopPropagation();triggerFilePick()">Browse files</button>
  </div>
  <div class="drop-examples">
    <span class="drop-example">📍 Città singola</span>
    <span class="drop-example">🗺️ Multi-città</span>

  </div>
  <div class="drop-error" id="dropError"></div>

<!-- ============================================================
     APP
============================================================ -->
<div id="app">

  <!-- TOPBAR -->
  <div class="topbar" id="topbar">
    <div class="topbar-left">

        <div class="topbar-title" id="topbarTitle">Travel Planner</div>

      </div>
    </div>
    <div class="topbar-right">

      <button class="topbar-btn" id="syncBtn" onclick="syncAction()">☁️ Sync</button>
      <button class="topbar-btn" onclick="exportJSONPlanner()">💾 Backup</button>
      <button class="topbar-btn" onclick="exportCSVPlanner()">📥 CSV</button>
      <button class="topbar-btn" onclick="exportPDF()">🖨️ PDF</button>
      <button class="topbar-btn" onclick="loadNewFile()">📂 New</button>

    <div class="main-panel" id="mainPanel">

        <div class="map-container" style="flex:1">
          <div class="map-sidebar" id="mapSidebar"></div>
          <div class="map-area"><div id="mainMap"></div></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Modifica</div>
    <div id="modalBody"></div>
  </div>

<script>
/* ============================================================
   AUTO-LOAD FROM GENERATOR (via localStorage)
   ============================================================ */
(function() {
  try {
    var pending = localStorage.getItem("tripcraft_pending_json");
    if (pending) {
      var data = JSON.parse(pending);
      /* Move to persistent key so navigating back still works */
      localStorage.setItem("tripcraft_last_json", pending);
      localStorage.setItem("tripcraft_last_filename", localStorage.getItem("tripcraft_pending_filename") || "trip_data.json");
      localStorage.removeItem("tripcraft_pending_json");
      localStorage.removeItem("tripcraft_pending_filename");
      document.addEventListener("DOMContentLoaded", function() {
        initPlanner(data);
      });
    } else {
      /* No new generation — try to restore last session */
      var last = localStorage.getItem("tripcraft_last_json");
      if (last) {
        var data = JSON.parse(last);
        document.addEventListener("DOMContentLoaded", function() {
          initPlanner(data);
        });
      }
    }
  } catch(e) { /* silent — user can still drop a file manually */ }
})();

/* ============================================================
   GLOBALS
   ============================================================ */
var TPG = null;
var TPG_OVERRIDES = {};
var STORAGE_KEY = "";
var currentTab = "";
var currentLegFilter = "all";
var currentDayKey = "";
var currentSection = "";
var leafletMap = null;
var mapLayers = {};
var isDark = false;
var calendarStyle = "strutturato";

var SLOT_LABELS = {
  morning: "Morning",
  lunch: "Lunch",
  afternoon: "Afternoon",
  dinner: "Dinner",
  evening: "Evening"
};

var LOG_CAT_LABELS = {
  local_transport: "Local Transport",
  transport: "Transport",
  health: "Health",
  money: "Money & ATMs",
  connectivity: "Connectivity",
  permits: "Permits",
  safety: "Safety",
  other: "Other"
};

var SECTION_ICONS = {
  journeys:  "✈️",
  import:    "📥",
  guide:     "📖",
  calendar: "📅",
  map: "🗺️",
  restaurants: "🍽️",
  excursions: "🥾",
  attractions: "🏛️",
  parks: "🌳",
  logistics: "📋",
  events: "🎭",
  accommodation: "🏨",
  zones: "📍",
  notes: "📝"
};

var SECTION_LABELS = {
  journeys:      "Journeys",
  import:        "Import",
  guide:         "Guide",
  calendar:      "Calendar",
  map:           "Map",
  restaurants:   "Restaurants",
  excursions:    "Excursions",
  attractions:   "Attractions",
  parks:         "Parks",
  logistics:     "Logistics",
  events:        "Events",
  accommodation: "Accommodation",
  zones:         "Areas",
  notes:         "Notes"
};

/* ============================================================
   THEME
   ============================================================ */
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.classList.toggle("dark", isDark);
  document.getElementById("themeBtn").textContent = isDark ? "☀️" : "🌙";
}

/* ============================================================
   FILE LOAD
   ============================================================ */
function triggerFilePick() {
  document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", function(e) {
  var file = e.target.files[0];
  if (file) readFile(file);
});

var dropBox = document.getElementById("dropBox");
dropBox.addEventListener("dragover", function(e) {
  e.preventDefault();
  dropBox.classList.add("dragover");
});
dropBox.addEventListener("dragleave", function() {
  dropBox.classList.remove("dragover");
});
dropBox.addEventListener("drop", function(e) {
  e.preventDefault();
  dropBox.classList.remove("dragover");
  var file = e.dataTransfer.files[0];
  if (file) readFile(file);
});

function readFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var content = e.target.result;
    /* Se il file è JSON, parsalo direttamente */
    if (file.name.endsWith(".json")) {
      try {
        var data = JSON.parse(content);
        initPlanner(data);
      } catch(err) {
        document.getElementById("dropError").textContent = "Error: invalid JSON file. " + err.message;
      }
      return;
    }
    /* TXT o MD: mostra il contenuto in una modale per permettere all'utente di copiarlo */
    document.getElementById("dropError").textContent = "TXT/MD files should be imported from the Import tab once the planner is loaded. Drop a JSON file first.";
  };
  reader.readAsText(file);
}

function loadNewFile() {
  document.getElementById("app").classList.remove("visible");
  document.getElementById("dropZone").style.display = "flex";
  TPG = null;
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }
  mapLayers = {};
}

/* ============================================================
   INIT PLANNER
   ============================================================ */
function initPlanner(data) {
  TPG = data;

  var slug = (data.meta.title || "trip").toLowerCase().replace(/[^a-z0-9]/g, "_");
  STORAGE_KEY = "tpg_" + slug;
  loadOverrides();

  document.getElementById("dropZone").style.display = "none";
  document.getElementById("app").classList.add("visible");

  var title = data.meta.title || "My Trip";
  document.title = title + " — Travel Planner";
  document.getElementById("topbarTitle").textContent = title;
  document.getElementById("topbarDates").textContent = data.trip.start_date + " → " + data.trip.end_date + " (" + data.trip.total_days + " days)";

  var firstLegColor = (data.legs && data.legs.length > 0) ? data.legs[0].color : "#1A6B8A";
  document.getElementById("topbar").style.background = firstLegColor;

  calendarStyle = data.meta.calendar_style || "strutturato";

  /* Always ensure import + guide tabs exist */
  var secs = TPG.meta.enabled_sections;
  if (!secs) { secs = ["calendar","map","restaurants","logistics"]; TPG.meta.enabled_sections = secs; }
  if (secs.indexOf("import") === -1) secs.push("import");
  if (secs.indexOf("guide") === -1) secs.push("guide");

  buildLegBar();
  buildTabs();

  var firstSection = TPG.meta.enabled_sections[0];
  showTab(firstSection);
}

/* ============================================================
   LEG BAR
   ============================================================ */
function buildLegBar() {
  var bar = document.getElementById("legBar");
  var type = TPG.meta.trip_type;
  if (type === "single_city" || !TPG.legs || TPG.legs.length <= 1) {
    bar.classList.remove("visible");
    return;
  }
  bar.classList.add("visible");
  var html = "<div class='leg-pill active' id='leg-all' style='border-color:var(--border)' onclick='setLegFilter(\"all\")'>Tutte le tappe</div>";
  TPG.legs.forEach(function(leg) {
    html += "<div class='leg-pill' id='leg-" + leg.id + "' style='border-color:" + leg.color + "' onclick='setLegFilter(\"" + leg.id + "\")'>";
    html += leg.name + "</div>";
  });
  bar.innerHTML = html;
}

function setLegFilter(legId) {
  currentLegFilter = legId;
  document.querySelectorAll(".leg-pill").forEach(function(el) {
    el.classList.remove("active");
    el.style.background = "";
    el.style.color = "";
  });
  var active = document.getElementById("leg-" + legId);
  if (active) {
    active.classList.add("active");
    if (legId !== "all") {
      var leg = getLeg(legId);
      if (leg) {
        active.style.background = leg.color;
        active.style.color = "white";
      }
    } else {
      active.style.background = "var(--accent)";
      active.style.color = "white";
    }
  }
  if (currentTab === "calendar") {
    renderCalSidebar();
  } else if (currentTab === "map") {
    renderMap();
  } else {
    showSection(currentTab);
  }
}

function getLeg(id) {
  return (TPG.legs || []).find(function(l) { return l.id === id; }) || null;
}

function getFilteredLegs() {
  if (currentLegFilter === "all") return TPG.legs || [];
  return (TPG.legs || []).filter(function(l) { return l.id === currentLegFilter; });
}

/* ============================================================
   TABS
   ============================================================ */
function buildTabs() {
  var bar = document.getElementById("tabsBar");
  var html = "";
  (TPG.meta.enabled_sections || []).forEach(function(sec) {
    var icon = SECTION_ICONS[sec] || "";
    var label = SECTION_LABELS[sec] || sec;
    html += "<button class='tab' id='tab-" + sec + "' onclick='showTab(\"" + sec + "\")'>" + icon + " " + label + "</button>";
  });
  bar.innerHTML = html;
}

function showTab(sec) {
  currentTab = sec;
  document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
  var tabEl = document.getElementById("tab-" + sec);
  if (tabEl) tabEl.classList.add("active");

  var sidebar = document.getElementById("sidebar");
  var dayView = document.getElementById("dayView");
  var sectionView = document.getElementById("sectionView");
  var mapView = document.getElementById("mapView");
  var placeholder = document.getElementById("placeholder");

  sidebar.style.display = "none";
  dayView.style.display = "none";
  sectionView.style.display = "none";
  mapView.style.display = "none";
  placeholder.style.display = "none";

  if (sec === "calendar") {
    sidebar.style.display = "flex";
    placeholder.style.display = "block";
    renderCalSidebar();
  } else if (sec === "map") {
    mapView.style.display = "flex";
    mapView.style.height = "100%";
    renderMap();
  } else if (sec === "journeys") {
    sectionView.style.display = "block";
    renderJourneys(sectionView);
  } else {
    sectionView.style.display = "block";
    showSection(sec);
  }
}

/* ============================================================
   OVERRIDES (localStorage)
   ============================================================ */
function loadOverrides() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    TPG_OVERRIDES = raw ? JSON.parse(raw) : {};
  } catch(e) {
    TPG_OVERRIDES = {};
  }
}

function saveOverrides() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(TPG_OVERRIDES));
  } catch(e) {}
}

function getOverride(key) {
  return TPG_OVERRIDES[key] || {};
}

function setOverride(key, data) {
  TPG_OVERRIDES[key] = Object.assign(getOverride(key), data);
  saveOverrides();
}

/* ============================================================
   CALENDAR SIDEBAR
   ============================================================ */
function renderCalSidebar() {
  var list = document.getElementById("calList");
  var cal = TPG.calendar || {};
  var keys = Object.keys(cal).sort();
  var filtered = keys.filter(function(k) {
    if (currentLegFilter === "all") return true;
    return cal[k].leg_id === currentLegFilter;
  });
  if (filtered.length === 0) {
    list.innerHTML = "<div style='padding:16px 12px;font-size:12px;color:var(--text2);text-align:center;line-height:1.8'><div style='font-size:24px;margin-bottom:8px'>📅</div><strong>Empty calendar</strong><br>Regenerate JSON with the generator using AI,<br>or add data from the Import tab.</div>";
    return;
  }
  list.innerHTML = filtered.map(function(k) {
    return buildDayItem(k, cal[k]);
  }).join("");
}

function buildDayItem(key, day) {
  var d = new Date(key + "T00:00:00");
  var dayNum = d.getDate();
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var mon = months[d.getMonth()];
  var dateStr = (dayNum < 10 ? "0" + dayNum : dayNum) + " " + mon;
  var type = day.type || "normal";
  var color = day.leg_color || "#1A6B8A";
  var leg = getLeg(day.leg_id);
  var legName = leg ? leg.name : (day.leg_id || "");
  var preview = "";
  var slots = day.slots || {};
  var morn = slots.morning; var aft = slots.afternoon;
  if (morn) preview = (typeof morn === "object") ? (morn.text || "") : morn;
  else if (aft) preview = (typeof aft === "object") ? (aft.text || "") : aft;
  if (preview.length > 28) preview = preview.substring(0, 28) + "...";
  if (!preview) preview = "—";
  var isActive = key === currentDayKey;
  /* Determina label tipo giorno: controlla SEMPRE i journeys del giorno (non solo se type=transfer),
     poi controlla escursioni negli slot se non c'è journey */
  var journeyIcon = "";
  var dayTypeLabel = "";
  var dayJ = getJourneysForDate(key);
  if (dayJ.length && dayJ[0].segments && dayJ[0].segments.length) {
    var segType = dayJ[0].segments[0].type || "flight";
    var segIcons = { flight:"✈️", train:"🚆", bus:"🚌", car:"🚗", ferry:"⛴️", taxi:"🚕", transfer:"🚐", walk:"🚶", other:"🚀" };
    var segLabels = { flight:"FLIGHT", train:"TRAIN", bus:"BUS", car:"CAR", ferry:"FERRY", taxi:"TAXI", transfer:"TRANSFER", walk:"WALK", other:"TRANSFER" };
    journeyIcon = segIcons[segType] || "✈️";
    dayTypeLabel = segLabels[segType] || "TRANSFER";
  } else if (type === "transfer") {
    journeyIcon = "🚐";
    dayTypeLabel = "TRANSFER";
  } else {
    var hasExc = false;
    ["morning","afternoon"].forEach(function(sk) {
      var sv = slots[sk];
      var its = (sv && typeof sv === "object") ? (sv.items || []) : [];
      if (its.some(function(it) { return it._excursion_id; })) hasExc = true;
    });
    if (hasExc) dayTypeLabel = "EXCURSION";
  }
  return "<div class='day-item" + (isActive ? " active" : "") + "' id='di-" + key + "' onclick='selectDay(\"" + key + "\")'>" +
    "<div class='day-stripe' style='background:" + color + "'></div>" +
    "<div style='min-width:0;flex:1'>" +
    "<div style='display:flex;align-items:center;gap:6px;margin-bottom:2px'>" +
    "<span class='day-item-date'>" + dateStr + "</span>" +
    "<span class='day-item-type type-" + type + "'>" + (journeyIcon || type) + "</span>" +
    (dayTypeLabel ? "<span style='font-size:9px;font-weight:700;color:var(--amber);letter-spacing:.03em'>" + dayTypeLabel + "</span>" : "") +
    "</div>" +
    (legName ? "<div style='font-size:10px;color:" + color + ";font-weight:600;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'>" + escHtml(legName) + "</div>" : "") +
    "<div style='font-size:11px;color:var(--muted);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'>" + preview + "</div>" +
    "</div>" +
    "</div>";
}

function filterCalSidebar(q) {
  var ql = q.toLowerCase();
  var cal = TPG.calendar || {};
  var keys = Object.keys(cal).sort().filter(function(k) {
    if (currentLegFilter !== "all" && cal[k].leg_id !== currentLegFilter) return false;
    if (!ql) return true;
    var d = cal[k];
    var slots = d.slots || {};
    function slotTxt(s) { return s ? (typeof s === "object" ? (s.text || "") : s) : ""; }
    var text = k + " " + slotTxt(slots.morning) + " " + slotTxt(slots.afternoon) + " " + slotTxt(slots.dinner);
    return text.toLowerCase().indexOf(ql) !== -1;
  });
  document.getElementById("calList").innerHTML = keys.map(function(k) {
    return buildDayItem(k, cal[k]);
  }).join("");
}

/* ============================================================
   DAY VIEW
   ============================================================ */
function selectDay(key) {
  currentDayKey = key;
  document.querySelectorAll(".day-item").forEach(function(el) { el.classList.remove("active"); });
  var el = document.getElementById("di-" + key);
  if (el) el.classList.add("active");
  renderDayView(key);
}

function swapDayContent(keyA, keyB) {
  /* Scambia il contenuto (slots, type, accommodation_ref) tra due giorni adiacenti.
     Le date restano fisse e sequenziali; cambia solo cosa è programmato quel giorno. */
  var ovA = getOverride("cal_" + keyA);
  var ovB = getOverride("cal_" + keyB);
  var cal = TPG.calendar || {};
  var dayA = cal[keyA];
  var dayB = cal[keyB];
  if (!dayA || !dayB) return;

  function effSlots(day, ov) { return (ov.slots !== undefined) ? ov.slots : (day.slots || {}); }
  function effType(day, ov) { return (ov.type !== undefined) ? ov.type : (day.type || "normal"); }
  function effAcc(day, ov) { return (ov.accommodation_ref !== undefined) ? ov.accommodation_ref : (day.accommodation_ref || null); }

  var contentA = { slots: effSlots(dayA, ovA), type: effType(dayA, ovA), accommodation_ref: effAcc(dayA, ovA) };
  var contentB = { slots: effSlots(dayB, ovB), type: effType(dayB, ovB), accommodation_ref: effAcc(dayB, ovB) };

  ovA.slots = contentB.slots; ovA.type = contentB.type; ovA.accommodation_ref = contentB.accommodation_ref; ovA._swapped = true;
  ovB.slots = contentA.slots; ovB.type = contentA.type; ovB.accommodation_ref = contentA.accommodation_ref; ovB._swapped = true;

  setOverride("cal_" + keyA, ovA);
  setOverride("cal_" + keyB, ovB);

  renderDayView(keyA);
  renderCalSidebar();
}

function moveSlotItem(dayKey, slotKey, idx, direction) {
  /* Sposta un item su (-1) o giù (+1) dentro lo stesso slot, riordinando gli orari mostrati */
  var ov = getOverride("cal_" + dayKey);
  var cal = TPG.calendar || {};
  var day = cal[dayKey];
  if (!day) return;
  var rawSlot = day.slots && day.slots[slotKey];
  var ovSlot = ov.slots && ov.slots[slotKey] !== undefined ? ov.slots[slotKey] : null;
  var effectiveSlot = ovSlot !== null ? ovSlot : rawSlot;
  var text = getSlotText(effectiveSlot);
  var items = getSlotItems(effectiveSlot).slice();

  var newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= items.length) return;
  var tmp = items[idx];
  items[idx] = items[newIdx];
  items[newIdx] = tmp;

  if (!ov.slots) ov.slots = {};
  ov.slots[slotKey] = { text: text, items: items };
  setOverride("cal_" + dayKey, ov);
  renderDayView(dayKey);
}

function renderDayView(key) {
  var cal = TPG.calendar || {};
  var day = cal[key];
  if (!day) return;

  document.getElementById("placeholder").style.display = "none";
  document.getElementById("dayView").style.display = "block";

  var d = new Date(key + "T00:00:00");
  var weekdays = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var months2 = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var dateLabel = weekdays[d.getDay()] + " " + d.getDate() + " " + months2[d.getMonth()] + " " + d.getFullYear();

  var leg = getLeg(day.leg_id);
  var legColor = day.leg_color || "#1A6B8A";
  var legName = leg ? leg.name : (day.leg_id || "");

  var ov = getOverride("cal_" + key);
  var type = (ov.type !== undefined) ? ov.type : (day.type || "normal");
  /* Se il giorno è stato scambiato (swap), ov._swapped contiene l'intero set di slot sostitutivo */
  var slots = ov._swapped ? (ov.slots || {}) : (day.slots || {});
  var effAccRef = (ov.accommodation_ref !== undefined) ? ov.accommodation_ref : day.accommodation_ref;

  /* Compute prev/next keys for navigation */
  var cal2 = TPG.calendar || {};
  var calKeys = Object.keys(cal2).sort().filter(function(k) {
    if (currentLegFilter === "all") return true;
    return cal2[k].leg_id === currentLegFilter;
  });
  var keyIdx = calKeys.indexOf(key);
  var prevKey = keyIdx > 0 ? calKeys[keyIdx - 1] : null;
  var nextKey = keyIdx < calKeys.length - 1 ? calKeys[keyIdx + 1] : null;

  /* Determina label tipo giorno: trasporto o escursione */
  var dayTypeLabel = "";
  var dayJ = getJourneysForDate(key);
  if (dayJ.length && dayJ[0].segments && dayJ[0].segments.length) {
    var segTypeLabels = { flight:"FLIGHT", train:"TRAIN", bus:"BUS", car:"CAR", ferry:"FERRY", taxi:"TAXI", transfer:"TRANSFER", walk:"WALK", other:"TRANSFER" };
    dayTypeLabel = segTypeLabels[dayJ[0].segments[0].type] || "TRANSFER";
  } else if (type === "transfer") {
    dayTypeLabel = "TRANSFER";
  } else {
    /* Controlla se ci sono escursioni negli slot del giorno */
    var hasExc = false;
    ["morning","afternoon"].forEach(function(sk) {
      var sv = slots[sk];
      var its = (sv && typeof sv === "object") ? (sv.items || []) : [];
      if (its.some(function(it) { return it._excursion_id; })) hasExc = true;
    });
    if (hasExc) dayTypeLabel = "EXCURSION";
  }

  var html = "<div class='day-header'>";
  html += "<div class='day-nav'>";
  html += "<button class='day-nav-btn' " + (prevKey ? "onclick='selectDay(\"" + prevKey + "\")'" : "disabled") + " title='Previous day'>&#8592;</button>";
  html += "<button class='day-nav-btn' " + (prevKey ? "onclick='swapDayContent(\"" + key + "\",\"" + prevKey + "\")'" : "disabled") + " title='Swap with previous day'>&#8593;</button>";
  html += "<div class='day-nav-center'>";
  html += "<div class='day-title'>" + dateLabel + "</div>";
  html += "<div class='day-meta'><span style='color:var(--muted)'>" + key + "</span> <span style='color:var(--muted2);font-size:10px'>" + (keyIdx + 1) + " / " + calKeys.length + "</span></div>";
  html += "</div>";
  html += "<button class='day-nav-btn' " + (nextKey ? "onclick='swapDayContent(\"" + key + "\",\"" + nextKey + "\")'" : "disabled") + " title='Swap with next day'>&#8595;</button>";
  html += "<button class='day-nav-btn' " + (nextKey ? "onclick='selectDay(\"" + nextKey + "\")'" : "disabled") + " title='Next day'>&#8594;</button>";
  html += "</div>";
  html += "<div class='day-badges'>";
  html += "<span class='day-badge badge-leg' style='background:" + legColor + "'>" + legName + "</span>";
  html += "<span class='day-item-type type-" + type + " day-badge'>" + type + "</span>";
  if (dayTypeLabel) html += "<span class='day-badge' style='background:var(--amber);color:#1a1408;font-weight:700'>" + dayTypeLabel + "</span>";
  html += "</div></div>";

  /* Calendar style toggle — only if structured items exist */
  var hasItems = false;
  ["morning","lunch","afternoon","dinner","evening"].forEach(function(sk) {
    var sv = slots[sk];
    if (sv && typeof sv === "object" && (sv.items || []).length) hasItems = true;
  });
  if (hasItems) {
    html += "<div class='cal-style-toggle'>";
    ["sintetico","strutturato","dettagliato"].forEach(function(s) {
      html += "<button class='cal-style-btn" + (calendarStyle === s ? " active" : "") + "' onclick='setCalStyle(\"" + s + "\",\"" + key + "\")' >" + s + "</button>";
    });
    html += "</div>";
  }

  /* Journey mini-block */
  var dayJourneys = getJourneysForDate(key);
  if (dayJourneys.length) {
    html += renderDayJourneyBlock(dayJourneys);
  }

  /* Slots */
  var slotKeys = ["morning","lunch","afternoon","dinner","evening"];
  slotKeys.forEach(function(sk) {
    var rawSlot = slots[sk];
    var ovSlot = ov.slots && ov.slots[sk] !== undefined ? ov.slots[sk] : null;
    var effectiveSlot = ovSlot !== null ? ovSlot : rawSlot;
    var content = renderSlotContent(effectiveSlot, calendarStyle, key, sk);
    var isEmpty = !content.trim();
    html += "<div class='slot-card'>";
    html += "<div class='slot-header'><span class='slot-label'>" + (SLOT_LABELS[sk] || sk) + "</span></div>";
    html += "<div class='slot-body" + (isEmpty ? " empty" : "") + "' id='slotbody-" + sk + "'>";
    html += isEmpty ? "—" : content;
    html += "</div>";
    html += "<div class='slot-actions'>";
    html += "<button class='btn-sm' onclick='openSlotEdit(\"" + key + "\",\"" + sk + "\")'>✏️ Edit</button>";
    html += "<button class='btn-sm' onclick='openAddActivity(\"" + key + "\",\"" + sk + "\")'>+ Activity</button>";
    if (sk === "lunch" || sk === "dinner") {
      html += "<button class='btn-sm btn-rest-pick' onclick='openRestPicker(\"" + key + "\",\"" + sk + "\")'>🍽️ Restaurant</button>";
    }
    if (!isEmpty) {
      html += "<button class='btn-sm' style='color:var(--red)' onclick='clearSlotContent(\"" + key + "\",\"" + sk + "\")' title='Svuota slot'>🗑️</button>";
    }
    if (ov.slots && ov.slots[sk] !== undefined) {
      html += "<button class='btn-sm' style='color:var(--muted)' onclick='clearSlotOverride(\"" + key + "\",\"" + sk + "\")'>↩️ Restore</button>";
    }
    html += "</div></div>";
  });

  if (effAccRef) {
    var accLeg = leg;
    var legAcc = accLeg ? (accLeg.accommodation || {}) : {};
    var accOpts = legAcc.options || [];
    var acc = accOpts.find(function(a) { return a.id === effAccRef; });
    /* Non mostrare il giorno di check-out */
    var isCheckout = legAcc.check_out && legAcc.check_out === key;
    if (acc && !isCheckout) {
      html += "<div style='margin-top:8px;padding:10px 12px;background:rgba(27,107,138,.06);border:1px solid rgba(27,107,138,.15);border-radius:var(--radius);font-size:12px;'>";
      html += "🏨 <strong>" + escHtml(acc.name) + "</strong>";
      if (acc.price_night) html += " &mdash; " + acc.price_night + " " + (acc.price_currency || "");
      html += "</div>";
    }
  }

  document.getElementById("dayView").innerHTML = html;
}

function setCalStyle(style, key) {
  calendarStyle = style;
  renderDayView(key);
}

function openSlotEdit(key, sk) {
  var cal = TPG.calendar || {};
  var day = cal[key];
  var ov = getOverride("cal_" + key);
  var rawSlot = day && day.slots && day.slots[sk];
  var ovSlot = ov.slots && ov.slots[sk] !== undefined ? ov.slots[sk] : null;
  var effectiveSlot = ovSlot !== null ? ovSlot : rawSlot;
  var currentText = getSlotText(effectiveSlot);
  var items = getSlotItems(effectiveSlot);
  var label = SLOT_LABELS[sk] || sk;

  document.getElementById("modalTitle").textContent = label + " — " + key;

  if (items.length) {
    /* Editor strutturato: un blocco per ogni item con orario, attivita, durata, descrizione */
    var html = "<div style='font-size:11px;color:var(--muted);margin-bottom:10px'>Edit each activity. Use the + Activity button on the day view to add new ones.</div>";
    html += "<div id='slotEditItems'>";
    items.forEach(function(it, idx) {
      html += "<div class='slot-edit-item' data-idx='" + idx + "' style='border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:8px'>";
      html += "<div style='display:grid;grid-template-columns:70px 1fr 70px;gap:6px;margin-bottom:6px'>";
      html += "<input type='text' class='se-time' value='" + escHtml(it.time || "") + "' placeholder='09:00' style='background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:4px 6px;font-size:12px'>";
      html += "<input type='text' class='se-activity' value='" + escHtml(it.activity || "") + "' placeholder='Activity' style='background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:4px 6px;font-size:12px'>";
      html += "<input type='number' class='se-duration' value='" + (it.duration_min || "") + "' placeholder='min' style='background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:4px 6px;font-size:12px'>";
      html += "</div>";
      html += "<textarea class='se-desc' rows='2' placeholder='Description (optional)' style='width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:4px 6px;font-size:12px;resize:vertical;box-sizing:border-box;margin-bottom:6px'>" + escHtml(it.description || "") + "</textarea>";
      html += "<div style='display:flex;justify-content:space-between;align-items:center'>";
      html += "<label style='font-size:11px;display:flex;align-items:center;gap:4px'><input type='checkbox' class='se-booking'" + (it.booking_required ? " checked" : "") + "> Booking required</label>";
      html += "<button class='btn-sm' style='color:var(--red)' onclick='this.closest(\".slot-edit-item\").remove()'>🗑️ Remove</button>";
      html += "</div></div>";
    });
    html += "</div>";
    html += "<div style='margin-bottom:10px'><label style='font-size:11px;color:var(--muted)'>Summary text (optional)</label>";
    html += "<textarea id='slotEditTa' rows='2' style='width:100%;box-sizing:border-box'>" + escHtml(currentText) + "</textarea></div>";
    html += "<div class='modal-actions'>";
    html += "<button class='btn-cancel' onclick='closeModal()'>Cancel</button>";
    html += "<button class='btn-save' onclick='saveSlotEditStructured(\"" + key + "\",\"" + sk + "\")'>Save</button>";
    html += "</div>";
    document.getElementById("modalBody").innerHTML = html;
  } else {
    /* Editor semplice: solo testo libero (stile sintetico, nessun item con orario) */
    document.getElementById("modalBody").innerHTML =
      "<div style='font-size:11px;color:var(--muted);margin-bottom:8px'>Edit the summary text.</div>" +
      "<textarea id='slotEditTa' rows='4' style='width:100%;box-sizing:border-box'>" + escHtml(currentText) + "</textarea>" +
      "<div class='modal-actions'>" +
      "<button class='btn-cancel' onclick='closeModal()'>Cancel</button>" +
      "<button class='btn-save' onclick='saveSlotEdit(\"" + key + "\",\"" + sk + "\")'>Save</button>" +
      "</div>";
  }
  document.getElementById("modalOverlay").classList.add("show");
  setTimeout(function() { var ta = document.getElementById("slotEditTa"); if (ta) ta.focus(); }, 50);
}

function saveSlotEditStructured(key, sk) {
  var text = (document.getElementById("slotEditTa") || {}).value || "";
  var items = [];
  document.querySelectorAll("#slotEditItems .slot-edit-item").forEach(function(block) {
    var activity = (block.querySelector(".se-activity") || {}).value || "";
    if (!activity.trim()) return;
    items.push({
      time: (block.querySelector(".se-time") || {}).value || "",
      activity: activity.trim(),
      duration_min: parseInt((block.querySelector(".se-duration") || {}).value || "0") || 0,
      description: (block.querySelector(".se-desc") || {}).value || "",
      url: "",
      booking_required: !!(block.querySelector(".se-booking") || {}).checked
    });
  });
  items.sort(function(a, b) { return (a.time || "").localeCompare(b.time || ""); });

  var ov = getOverride("cal_" + key);
  if (!ov.slots) ov.slots = {};
  ov.slots[sk] = { text: text, items: items };
  setOverride("cal_" + key, ov);
  closeModal();
  renderDayView(key);
  renderCalSidebar();
}

function saveSlotEdit(key, sk) {
  var val = document.getElementById("slotEditTa").value;
  var ov = getOverride("cal_" + key);
  if (!ov.slots) ov.slots = {};
  var cal = TPG.calendar || {};
  var day = cal[key];
  var rawSlot = day && day.slots && day.slots[sk];
  var origItems = getSlotItems(rawSlot);
  if (origItems.length) {
    ov.slots[sk] = { text: val, items: origItems };
  } else {
    ov.slots[sk] = val;
  }
  setOverride("cal_" + key, ov);
  closeModal();
  renderDayView(key);
}

function openAddActivity(key, sk) {
  var label = SLOT_LABELS[sk] || sk;
  document.getElementById("modalTitle").textContent = "+ Activity — " + label + " " + key;
  document.getElementById("modalBody").innerHTML =
