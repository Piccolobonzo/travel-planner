<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Pagina non trovata | TripCraft</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0c1220;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
    position: relative;
  }

  /* Animated star field background */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(1); }
    to   { opacity: 0.7; transform: scale(1.3); }
  }

  /* Floating compass */
  .compass-wrap {
    position: relative;
    z-index: 1;
    margin-bottom: 40px;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-12px); }
  }
  .compass {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid #0ea5e9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    background: rgba(14, 165, 233, 0.08);
    box-shadow: 0 0 40px rgba(14, 165, 233, 0.25);
  }
  .compass-inner {
    animation: spin 8s linear infinite;
    display: inline-block;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 480px;
  }

  .error-code {
    font-size: 96px;
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, #0ea5e9 0%, #6c63ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
    letter-spacing: -4px;
  }

  .tagline {
    font-size: 22px;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 12px;
  }

  .sub {
    font-size: 15px;
    color: #94a3b8;
    line-height: 1.6;
    margin-bottom: 40px;
  }

  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-primary {
    background: linear-gradient(135deg, #0ea5e9, #6c63ff);
    color: #fff;
    border: none;
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.2s, transform 0.2s;
    display: inline-block;
  }
  .btn-primary:hover {
    opacity: 0.88;
    transform: translateY(-2px);
  }

  .btn-secondary {
    background: rgba(255,255,255,0.06);
    color: #cbd5e1;
    border: 1px solid rgba(255,255,255,0.12);
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.2s;
    display: inline-block;
  }
  .btn-secondary:hover {
    background: rgba(255,255,255,0.1);
    transform: translateY(-2px);
  }

  .logo {
    position: fixed;
    top: 24px;
    left: 32px;
    font-size: 20px;
    font-weight: 700;
    color: #0ea5e9;
    text-decoration: none;
    z-index: 2;
    letter-spacing: -0.5px;
  }
  .logo span { color: #6c63ff; }

  @media (max-width: 480px) {
    .error-code { font-size: 72px; }
    .tagline { font-size: 18px; }
    .actions { flex-direction: column; align-items: center; }
    .btn-primary, .btn-secondary { width: 100%; max-width: 280px; text-align: center; }
  }
</style>
</head>
<body>

<a href="/travel-planner/" class="logo">Trip<span>Craft</span></a>

<!-- Star field -->
<div class="stars" id="stars"></div>

<div class="compass-wrap">
  <div class="compass">
    <span class="compass-inner">🧭</span>
  </div>
</div>

<div class="content">
  <div class="error-code">404</div>
  <div class="tagline">Destinazione non trovata</div>
  <p class="sub">Sembra che questa pagina abbia preso una deviazione non prevista.<br>Torna alla rotta principale e pianifica il tuo prossimo viaggio.</p>
  <div class="actions">
    <a href="/travel-planner/" class="btn-primary">🏠 Torna alla Home</a>
    <a href="/travel-planner/generator_v10.html" class="btn-secondary">✈️ Crea un Itinerario</a>
  </div>
</div>

<script>
  // Generate star field
  var container = document.getElementById("stars");
  for (var i = 0; i < 80; i++) {
    var star = document.createElement("div");
    var size = Math.random() * 2.5 + 0.5;
    star.className = "star";
    star.style.cssText = "width:" + size + "px;height:" + size + "px;" +
      "left:" + Math.random() * 100 + "%;" +
      "top:" + Math.random() * 100 + "%;" +
      "--d:" + (Math.random() * 3 + 1.5) + "s;" +
      "animation-delay:" + Math.random() * 3 + "s;";
    container.appendChild(star);
  }
</script>
</body>
</html>
